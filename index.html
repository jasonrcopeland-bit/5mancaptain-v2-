async function pinSignIn(playerId, pin) {
  const snap = await db.collection("players").doc(playerId).get();
  if (!snap.exists) return { error: "Player not found" };
  const data = snap.data();
  if (!data.pin) return { error: "No PIN set" };
  if (data.pin !== pin) return { error: "Wrong PIN" };
  return { user: { uid: playerId, name: data.name } };
}

async function pinRegister(name, pin) {
  // Check if name already exists
  const snap = await db.collection("players").where("name", "==", name).limit(1).get();
  if (!snap.empty) {
    // Update existing player with PIN
    const id = snap.docs[0].id;
    await db.collection("players").doc(id).update({ pin });
    return { user: { uid: id, name } };
  }
  // Create new player
  const ref = await db.collection("players").add({ name, pin, rounds:0, wins:0, totalMoney:0, totalHoles:0, captainHoles:0, captainMoney:0 });
  return { user: { uid: ref.id, name } };
}

// ─── Rounds ───────────────────────────────────────────────────────────────────
function generateGameCode() {
  const words = ["CREEK","EAGLE","BIRDIE","BOGEY","FAIRWAY","GREEN","ROUGH","FLAG"];
  const word = words[Math.floor(Math.random() * words.length)];
  const num = Math.floor(Math.random() * 90) + 10;
  return `${word}-${num}`;
}

async function createRound(roundData) {
  const code = generateGameCode();
  const ref = await db.collection("rounds").add({
    ...roundData,
    gameCode: code,
    status: "active",
    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    holes: []
  });
  return { id: ref.id, gameCode: code };
}

async function getRound(id) {
  const doc = await db.collection("rounds").doc(id).get();
  return doc.exists ? { id: doc.id, ...doc.data() } : null;
}

async function getRoundByCode(code) {
  const snap = await db.collection("rounds").where("gameCode", "==", code.toUpperCase()).limit(1).get();
  if (snap.empty) return null;
  return { id: snap.docs[0].id, ...snap.docs[0].data() };
}

async function updateRound(id, data) {
  await db.collection("rounds").doc(id).update(data);
}

async function completeRound(id, finalLedger, results) {
  await db.collection("rounds").doc(id).update({
    status: "complete",
    finalLedger,
    results,
    completedAt: firebase.firestore.FieldValue.serverTimestamp()
  });
}

function onRound(id, cb) {
  return db.collection("rounds").doc(id).onSnapshot(doc => {
    if (doc.exists) cb({ id: doc.id, ...doc.data() });
  });
}

async function getRecentRounds(limit = 20) {
  const snap = await db.collection("rounds")
    .where("status", "==", "complete")
    .orderBy("completedAt", "desc")
    .limit(limit)
    .get();
  return snap.docs.map(d => ({ id: d.id, ...d.data() }));
}

// ─── Player Stats Update ───────────────────────────────────────────────────────
async function updatePlayerStats(roundData, finalLedger, holeHistory) {
  const { playerOrder, players } = roundData;
  const batch = db.batch();

  playerOrder.forEach((playerId, orderIdx) => {
    if (!playerId) return;
    const playerRef = db.collection("players").doc(playerId);
    const money = Math.round(finalLedger[orderIdx]);

    // Count holes as captain and money earned as captain
    let captainHoles = 0;
    let captainMoney = 0;
    let prevLedger = [0,0,0,0,0];

    holeHistory.forEach(h => {
      const moneyBefore = prevLedger[orderIdx];
      const moneyAfter = (h.ledgerAfter || prevLedger)[orderIdx];
      const holeMoney = (moneyAfter || 0) - (moneyBefore || 0);
      if (h.captain === orderIdx) {
        captainHoles++;
        captainMoney += holeMoney;
      }
      prevLedger = h.ledgerAfter || prevLedger;
    });

    batch.update(playerRef, {
      rounds: firebase.firestore.FieldValue.increment(1),
      totalMoney: firebase.firestore.FieldValue.increment(money),
      totalHoles: firebase.firestore.FieldValue.increment(18),
      captainHoles: firebase.firestore.FieldValue.increment(captainHoles),
      captainMoney: firebase.firestore.FieldValue.increment(captainMoney),
      wins: firebase.firestore.FieldValue.increment(
        finalLedger.indexOf(Math.max(...finalLedger)) === orderIdx ? 1 : 0
      ),
      lastIndex: players[orderIdx]?.index || ""
    });
  });

  await batch.commit();
}

// ─── React globals from CDN ────────────────────────────────────────────────────
const { useState, useEffect, useRef } = React;

// ─── Math helpers ──────────────────────────────────────────────────────────────
function calcCourseHdcp(index, slope, rating, par) {
  return Math.round(parseFloat(index||0) * (parseFloat(slope||113) / 113) + (parseFloat(rating||72) - parseFloat(par||72)));
}
function strokeHolesForPlayer(extra, holeHdcps) {
  if (extra <= 0) return [];
  return [...holeHdcps]
    .map((h, i) => ({ hole: i + 1, hdcp: parseInt(h) || i + 1 }))
    .sort((a, b) => a.hdcp - b.hdcp)
    .slice(0, extra).map(h => h.hole);
}
function fmt$(n) {
  if (n === 0 || n === undefined || n === null) return "$0";
  const rounded = Math.round(n);
  return (rounded < 0 ? "-$" : "+$") + Math.abs(rounded);
}
function whoIsFurtherBehind(pis, ledger, courseHdcps) {
  const [a, b] = pis;
  if (ledger[a] !== ledger[b]) return ledger[a] < ledger[b] ? [a, b] : [b, a];
  const hA = courseHdcps ? (courseHdcps[a] || 0) : 0;
  const hB = courseHdcps ? (courseHdcps[b] || 0) : 0;
  return hA >= hB ? [a, b] : [b, a];
}
function splitTwoWin(total, pis, ledger, courseHdcps) {
  const cents = Math.round(total * 100);
  const hi = Math.ceil(cents / 200); const lo = Math.floor(cents / 200);
  const [further, other] = whoIsFurtherBehind(pis, ledger, courseHdcps);
  return { [further]: hi, [other]: lo };
}
function splitTwoLoss(total, pis, ledger, courseHdcps) {
  const cents = Math.round(total * 100);
  const hi = Math.ceil(cents / 200); const lo = Math.floor(cents / 200);
  const [further, other] = whoIsFurtherBehind(pis, ledger, courseHdcps);
  return { [further]: lo, [other]: hi };
}
function nextPressDpp(mode, origDpp, currentDpp) {
  if (mode === "double") return currentDpp * 2;
  if (mode === "increment") return currentDpp + origDpp;
  return currentDpp;
}
function computeHdcpInfo(cd, players) {
  const par = parseInt(cd.par) || 72;
  const slope = parseFloat(cd.slope) || 113;
  const rating = parseFloat(cd.rating) || par;
  const courseHdcps = players.map(p => calcCourseHdcp(p.index, slope, rating, par));
  const low = Math.min(...courseHdcps);
  const extras = courseHdcps.map(ch => Math.max(0, ch - low));
  const sHoles = extras.map(e => strokeHolesForPlayer(e, cd.holeHdcps || []));
  return { courseHdcps, low, extras, sHoles, cd };
}
function applyHoleMoney(h, runningLedger, dpp, courseHdcps) {
  const realPts = h.pts === 7 ? 14 : (h.pts || 0);
  const nl = [...runningLedger];
  if (!h.winner || h.winner === "none" || realPts === 0) return nl;
  const isLone = h.partner === "alone";
  const ptVal = realPts * dpp * (isLone ? 2 : 1);
  // Build teams from stored orderIndices
  const captOI = [h.captainOI, ...(isLone ? [] : [h.partnerOI])];
  const fieldOI = [0,1,2,3,4].filter(i => !captOI.includes(i));
  const winOI = h.winner === "captain" ? captOI : fieldOI;
  const loseOI = h.winner === "captain" ? fieldOI : captOI;
  if (winOI.length === 1 && loseOI.length === 4) {
    loseOI.forEach(i => { nl[i] -= ptVal; }); nl[winOI[0]] += ptVal * 4;
  } else if (winOI.length === 4 && loseOI.length === 1) {
    nl[loseOI[0]] -= ptVal * 4; winOI.forEach(i => { nl[i] += ptVal; });
  } else if (winOI.length === 3 && loseOI.length === 2) {
    winOI.forEach(i => { nl[i] += ptVal; });
    const sp = splitTwoLoss(ptVal * 3, loseOI, nl, courseHdcps);
    loseOI.forEach(i => { nl[i] -= sp[i]; });
  } else if (winOI.length === 2 && loseOI.length === 3) {
    loseOI.forEach(i => { nl[i] -= ptVal; });
    const sp = splitTwoWin(ptVal * 3, winOI, nl, courseHdcps);
    winOI.forEach(i => { nl[i] += sp[i]; });
  }
  const totalCents = nl.reduce((s, v) => s + Math.round(v * 100), 0);
  if (totalCents !== 0) nl[winOI[0]] -= totalCents / 100;
  nl.forEach((v, i) => { nl[i] = Math.round(v); });
  return nl;
}
function replayLedger(holes, dpp, courseHdcps) {
  let ledger = [0,0,0,0,0];
  let currentDpp = dpp;
  return holes.map(h => {
    if (h.pressTo) currentDpp = h.pressTo;
    ledger = applyHoleMoney(h, ledger, currentDpp, courseHdcps);
    return { ...h, ledgerAfter: [...ledger], dpp: currentDpp };
  });
}
function computeSettlement(players, ledger) {
  const balances = players.map((p, i) => ({ ...p, bal: Math.round(ledger[i] || 0) }));
  const cred = balances.filter(p => p.bal > 0).sort((a,b) => b.bal - a.bal).map(p => ({...p, rem: p.bal}));
  const debt = balances.filter(p => p.bal < 0).sort((a,b) => a.bal - b.bal).map(p => ({...p, rem: Math.abs(p.bal)}));
  const txns = [];
  let ci = 0, di = 0;
  while (ci < cred.length && di < debt.length) {
    const amt = Math.min(cred[ci].rem, debt[di].rem);
    if (amt > 0) txns.push({ from: debt[di], to: cred[ci], amount: amt });
    cred[ci].rem -= amt; debt[di].rem -= amt;
    if (cred[ci].rem === 0) ci++;
    if (debt[di].rem === 0) di++;
  }
  return txns;
}
function paymentLink(method, handle, amount, note) {
  const enc = encodeURIComponent;
  switch(method) {
    case 'venmo':   return `venmo://paycharge?txn=pay&recipients=${enc(handle)}&amount=${amount}&note=${enc(note)}&audience=private`;
    case 'cashapp': return `cashapp://cash.app/${handle.startsWith('$')?handle:'$'+handle}?amount=${amount}`;
    case 'paypal':  return `https://paypal.me/${handle.replace('@','')}/${amount}`;
    default: return null;
  }
}

  function getFixedCaptain(hIdx) {
    if (!activeRound || activeRound.lightningRound !== "14") return null;
    if (hIdx === 14) return 3; // order index 3 = player 4
    if (hIdx === 15) return 4; // order index 4 = player 5
    return null;
  }
  function captainFor(hIdx, curLedger, curPassed) {
    const fixed = getFixedCaptain(hIdx);
    if (fixed !== null) return fixed;
    if (isLightningHole(hIdx)) {
      const eligible = [0,1,2,3,4].filter(i => !curPassed.includes(i));
      if (!eligible.length) return hIdx % 5;
      return [...eligible].sort((a,b) => curLedger[a] - curLedger[b])[0];
    }
    return hIdx % 5;
  }
  const curCaptainOI = activeRound ? captainFor(currentHole, ledger, passed) : 0;
  const orderPlayers = activeRound ? (activeRound.playerOrder || []).map(pid => players.find(p => p.id === pid) || { name:"?", index:"0" }) : [];
  const captainPlayer = orderPlayers[curCaptainOI];

  function getTeams() {
    if (partner === null) return null;
    if (partner === "alone") return { captOI:[curCaptainOI], fieldOI:[0,1,2,3,4].filter(i=>i!==curCaptainOI) };
    const captTeam = [curCaptainOI, partner];
    return { captOI:captTeam, fieldOI:[0,1,2,3,4].filter(i=>!captTeam.includes(i)) };
  }

  function computeLedger(h, curLedger) {
    const cd = activeRound?.courseData;
    const hdcps = cd ? computeHdcpInfo(cd, orderPlayers).courseHdcps : null;
    return applyHoleMoney(h, curLedger, activeDpp, hdcps);
  }

  async function finalizeHole() {
    const teams = getTeams();
    const realPts = pts === 7 ? 14 : (pts || 0);
    const holeRec = {
      hole: currentHole + 1,
      captainOI: curCaptainOI,
      partnerOI: partner === "alone" ? null : partner,
      partner,
      winner,
      pts: realPts,
      dpp: activeDpp,
      ledgerAfter: null,
    };
    const nl = computeLedger(holeRec, ledger);
    holeRec.ledgerAfter = nl;
    const newHoles = [...holes, holeRec];

    await updateRound(roundId, {
      holes: newHoles,
      activeDpp,
      [`ledger`]: nl,
    });

    if (currentHole >= 17) {
      await finishGame(nl, newHoles);
    } else {
      resetHoleUI();
    }
  }

  async function finishGame(finalLedger, finalHoles) {
    const cd = activeRound?.courseData;
    const results = orderPlayers.map((p, i) => ({
      playerId: activeRound.playerOrder[i],
      name: p.name,
      money: finalLedger[i]
    }));
    await completeRound(roundId, finalLedger, results);
    await updatePlayerStats(
      { playerOrder: activeRound.playerOrder, players: orderPlayers },
      finalLedger,
      finalHoles
    );
    setScreen("summary");
  }

  function resetHoleUI() {
    setStep("captain"); setPartner(null);
    setWinner(null); setPts(null);
    setShowPress(false); setPressingPlayer(null); setPressCustomVal("");
    setPassed([]);
  }

  async function applyPress() {
    let newDpp;
    const orig = parseFloat(activeRound?.dpp || 1);
    if (activeRound?.pressMode === "custom") newDpp = parseFloat(pressCustomVal);
    else newDpp = nextPressDpp(activeRound?.pressMode || "custom", orig, activeDpp);
    if (!newDpp || isNaN(newDpp)) return;
    setPressLog(pl => [...pl, { hole: currentHole+1, player: curCaptainOI, presser: pressingPlayer, fromDpp: activeDpp, toDpp: newDpp }]);
    setActiveDpp(newDpp);
    await updateRound(roundId, { activeDpp: newDpp });
    setShowPress(false); setPressingPlayer(null); setPressCustomVal("");
  }

  async function saveHoleEdit(hIdx, updates) {
    const newHoles = [...holes];
    newHoles[hIdx] = { ...newHoles[hIdx], ...updates };
    const cd = activeRound?.courseData;
    const hdcps = cd ? computeHdcpInfo(cd, orderPlayers).courseHdcps : null;
    // Replay from edited hole
    let runLedger = hIdx === 0 ? [0,0,0,0,0] : [...(newHoles[hIdx-1].ledgerAfter || [0,0,0,0,0])];
    for (let i = hIdx; i < newHoles.length; i++) {
      runLedger = applyHoleMoney(newHoles[i], runLedger, newHoles[i].dpp || activeDpp, hdcps);
      newHoles[i] = { ...newHoles[i], ledgerAfter: [...runLedger] };
    }
    await updateRound(roundId, { holes: newHoles, ledger: runLedger });
    setEditingHole(null);
  }

  const negativePlayers = [0,1,2,3,4].filter(i => ledger[i] < 0);
  const strokesThisHole = activeRound && hdcpInfo
    ? [0,1,2,3,4].map(oi => hdcpInfo.sHoles[oi]?.includes(currentHole + 1))
    : [false,false,false,false,false];

  // Compute hdcpInfo when round is active
  useEffect(() => {
    if (activeRound?.courseData && orderPlayers.length === 5) {
      setHdcpInfo(computeHdcpInfo(activeRound.courseData, orderPlayers));
    }
  }, [activeRound?.courseData, players]);

  // ── SCREENS ───────────────────────────────────────────────────────────────

  if (screen === "home") return (
    <HomeScreen S={S} user={user} players={players} roundHistory={roundHistory||[]}
      setScreen={setScreen} signOut={pinLogout}
      onJoinRound={async (code) => {
        const r = await getRoundByCode(code);
        if (!r) { setJoinErr("Game not found"); return; }
        setRoundId(r.id); setActiveRound(r); setIsScorekeeper(false);
        setScreen("spectate");
      }}
      joinCode={joinCode} setJoinCode={setJoinCode} joinErr={joinErr} setJoinErr={setJoinErr}
    />
  );

  if (screen === "roster") return (
    <RosterScreen S={S} players={players} currentUser={user}
      onSave={savePlayer} onDelete={deletePlayer} setScreen={setScreen} />
  );

  if (screen === "history") return (
    <HistoryScreen S={S} roundHistory={roundHistory} players={players}
      loadHistory={async () => { const h = await getRecentRounds(); setRoundHistory(h); }}
      setScreen={setScreen} />
  );

  if (screen === "stats") return (
    <StatsScreen S={S} players={players} setScreen={setScreen} />
  );

  if (screen === "newround") return (
    <NewRoundScreen S={S} players={players} courses={courses} user={user}
      onSaveCourse={saveCourse} onDeleteCourse={deleteCourse}
      onStart={async (roundData, cd) => {
        const hdcp = computeHdcpInfo(cd, roundData.orderPlayers);
        const { id, gameCode } = await createRound({
          ...roundData,
          courseData: cd,
          createdBy: user.uid,
          dpp: roundData.dpp,
          activeDpp: roundData.dpp,
        });
        setRoundId(id);
        setActiveRound({ ...roundData, courseData: cd, gameCode, id, holes: [], status:"active" });
        setHdcpInfo(hdcp);
        setActiveDpp(roundData.dpp);
        setLedger([0,0,0,0,0]);
        setCurrentHole(0); setHoles([]); setPressLog([]);
        setIsScorekeeper(true);
        resetHoleUI();
        setScreen("game");
      }}
    />
  );

  if (screen === "spectate" && activeRound) return (
    <SpectateScreen S={S} round={activeRound} holes={holes} ledger={ledger}
      orderPlayers={orderPlayers} currentHole={currentHole} setScreen={setScreen} fmt$={fmt$} />
  );

  if (screen === "game" && activeRound && isScorekeeper) {
    const holeNum = currentHole + 1;
    const teams = getTeams();
    const captTeamOI = teams?.captOI || [];
    const fieldOI = teams?.fieldOI || [];
    const captTeamNames = captTeamOI.map(oi => orderPlayers[oi]?.name);
    const fieldNames = fieldOI.map(oi => orderPlayers[oi]?.name);
    const isLone = partner === "alone";

    return (
      <div style={S.root}>
        {/* Game header */}
        <div style={S.gameHdr}>
          <div>
            <div style={{fontSize:26,fontWeight:700,letterSpacing:2,color:"#c5e8c5"}}>HOLE {holeNum}</div>
          </div>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:11,color:"#555"}}>{activeRound.courseData?.name}</div>
            <div style={{fontSize:12,color:"#f59e0b",fontWeight:700}}>{activeRound.gameCode}</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:16,color:"#4ade80",fontWeight:700}}>${activeDpp}/pt</div>
            <div style={{fontSize:10,color:"#555"}}>{holeNum}/18</div>
          </div>
        </div>

        {/* Ledger */}
        <div style={S.ledgerStrip}>
          {orderPlayers.map((p, oi) => (
            <div key={oi} style={S.ledgerItem}>
              <div style={{fontSize:10,color:"#555"}}>{p.name?.split(" ")[0]}</div>
              <div style={{fontSize:13,fontWeight:700,color:ledger[oi]>=0?"#4ade80":"#f87171"}}>{fmt$(ledger[oi])}</div>
              {strokesThisHole[oi] && <div style={{fontSize:9,color:"#f59e0b"}}>+1</div>}
            </div>
          ))}
        </div>
        {Math.round(ledger.reduce((s,v)=>s+v,0)) !== 0 && (
          <div style={{background:"#3a0000",fontSize:11,color:"#f87171",textAlign:"center",padding:"3px 8px"}}>
            ⚠️ Ledger imbalance — check scoring
          </div>
        )}

        <div style={S.card}>
          {/* Press */}
          {step === "captain" && holeNum > 1 && (
            <div style={S.pressZone}>
              {!showPress ? (
                <button style={{background:"transparent",border:"1px solid #2a1a00",borderRadius:8,color:"#f59e0b",padding:"9px 14px",fontSize:12,cursor:"pointer",fontFamily:"'Georgia',serif",width:"100%"}}
                  onClick={() => setShowPress(true)}>💰 Declare Press</button>
              ) : (
                <>
                  <div style={{fontSize:10,color:"#f59e0b",letterSpacing:2,marginBottom:8}}>WHO IS PRESSING?</div>
                  <div style={S.row}>
                    {negativePlayers.map(oi => (
                      <button key={oi}
                        style={{...S.btnGhost,fontSize:13,...(pressingPlayer===oi?{border:"1px solid #f59e0b",color:"#f59e0b"}:{})}}
                        onClick={() => setPressingPlayer(oi)}>
                        {orderPlayers[oi]?.name}
                      </button>
                    ))}
                    {negativePlayers.length === 0 && <div style={{fontSize:12,color:"#666"}}>No one is negative.</div>}
                  </div>
                  {pressingPlayer !== null && (
                    activeRound?.pressMode === "custom" ? (
                      <div style={S.row}>
                        <input style={{...S.inp,flex:1,marginBottom:0}} placeholder="New $/pt" type="number" step="0.5"
                          value={pressCustomVal} onChange={e => setPressCustomVal(e.target.value)} />
                        <button style={{...S.btnSm,marginLeft:6}} onClick={applyPress}>Set</button>
                      </div>
                    ) : (
                      <div style={{marginTop:8}}>
                        <div style={{fontSize:13,color:"#e4ede4"}}>
                          {activeRound?.pressMode==="double" ? `$${activeDpp} → $${activeDpp*2}/pt` : `$${activeDpp} → $${activeDpp+parseFloat(activeRound?.dpp||1)}/pt`}
                        </div>
                        <button style={{...S.btn,marginTop:8}} onClick={applyPress}>Confirm Press</button>
                      </div>
                    )
                  )}
                  <button style={{...S.btnGhost,width:"100%",marginTop:8}} onClick={() => { setShowPress(false); setPressingPlayer(null); }}>Cancel</button>
                </>
              )}
            </div>
          )}

          {/* Step 1: Captain picks */}
          {step === "captain" && (
            <>
              <div style={S.sec}>
                ⛳ {captainPlayer?.name} is Captain
                {isLightningHole(currentHole) && <span style={{color:"#f59e0b",fontSize:9,marginLeft:6}}>⚡ Lightning</span>}
                {getFixedCaptain(currentHole) !== null && <span style={{color:"#888",fontSize:9,marginLeft:6}}>(fixed)</span>}
              </div>
              {isLightningHole(currentHole) && (
                <button style={{...S.btnGhost,width:"100%",marginBottom:10}}
                  onClick={() => setPassed(p => [...p, curCaptainOI])}>
                  Pass → next biggest loser
                </button>
              )}
              {/* Stroke display */}
              <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:12}}>
                {orderPlayers.map((p, oi) => (
                  <div key={oi} style={{fontSize:12,color:strokesThisHole[oi]?"#f59e0b":"#444",background:strokesThisHole[oi]?"#1a1000":"#080d08",borderRadius:6,padding:"4px 8px",border:strokesThisHole[oi]?"1px solid #3a2000":"1px solid #1a3a1a"}}>
                    {p.name?.split(" ")[0]} {strokesThisHole[oi]?"+1":"—"}
                  </div>
                ))}
              </div>
              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                <button style={{...S.pickBtn,minWidth:"100%",...(partner==="alone"?S.pickBtnOn:{})}}
                  onClick={() => setPartner("alone")}>
                  🦅 Lone Captain
                  <div style={{fontSize:11,color:partner==="alone"?"#f59e0b":"#555",marginTop:3}}>win or lose 2×</div>
                </button>
                {[0,1,2,3,4].filter(oi => oi !== curCaptainOI).map(oi => (
                  <button key={oi} style={{...S.pickBtn,...(partner===oi?S.pickBtnOn:{})}}
                    onClick={() => setPartner(oi)}>
                    {orderPlayers[oi]?.name}
                    {strokesThisHole[oi] && <span style={{fontSize:10,color:"#f59e0b",marginLeft:4}}>+1</span>}
                  </button>
                ))}
              </div>
              {partner !== null && (
                <>
                  <div style={{display:"flex",gap:8,margin:"12px 0"}}>
                    <div style={{flex:1,background:"#080d08",borderRadius:8,padding:"10px 12px"}}>
                      <div style={{fontSize:9,letterSpacing:2,color:"#4ade80",marginBottom:4}}>CAPT'S TEAM</div>
                      {captTeamNames.map(n => <div key={n} style={{fontSize:14,color:"#c5e8c5"}}>{n}</div>)}
                    </div>
                    <div style={{flex:1,background:"#080d08",borderRadius:8,padding:"10px 12px"}}>
                      <div style={{fontSize:9,letterSpacing:2,color:"#888",marginBottom:4}}>FIELD</div>
                      {fieldNames.map(n => <div key={n} style={{fontSize:14,color:"#aaa"}}>{n}</div>)}
                    </div>
                  </div>
                  <button style={S.btn} onClick={() => setStep("result")}>Enter Result →</button>
                </>
              )}
            </>
          )}

          {/* Step 2: Result */}
          {step === "result" && (
            <>
              <div style={S.sec}>Who Won Hole {holeNum}?</div>
              <div style={{display:"flex",gap:8,marginBottom:14}}>
                <div style={{flex:1,background:"#080d08",borderRadius:8,padding:"10px 12px"}}>
                  <div style={{fontSize:9,letterSpacing:2,color:"#4ade80",marginBottom:4}}>CAPT'S TEAM</div>
                  {captTeamNames.map(n => <div key={n} style={{fontSize:13,color:"#c5e8c5"}}>{n}</div>)}
                </div>
                <div style={{flex:1,background:"#080d08",borderRadius:8,padding:"10px 12px"}}>
                  <div style={{fontSize:9,letterSpacing:2,color:"#888",marginBottom:4}}>FIELD</div>
                  {fieldNames.map(n => <div key={n} style={{fontSize:13,color:"#aaa"}}>{n}</div>)}
                </div>
              </div>
              <div style={{display:"flex",gap:6}}>
                {[{k:"captain",lbl:"Captain's Team"},{k:"field",lbl:"Field"},{k:"none",lbl:"No Blood"}].map(({k,lbl}) => (
                  <button key={k} style={{...S.winBtn,flex:k==="none"?0.7:1,...(winner===k?S.winBtnOn:{})}}
                    onClick={() => { setWinner(k); if(k==="none") setPts(null); }}>
                    {lbl}
                  </button>
                ))}
              </div>
              {winner && winner !== "none" && (
                <>
                  <div style={S.sec}>How Many Points?</div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:5,margin:"8px 0"}}>
                    {[1,2,3,4,5,6,7].map(p => (
                      <button key={p} style={{...S.ptBtn,...(pts===p?S.ptBtnOn:{})}} onClick={() => setPts(p)}>
                        {p}{p===7&&<div style={{fontSize:8,color:"#f59e0b",marginTop:2}}>×2</div>}
                      </button>
                    ))}
                  </div>
                </>
              )}
              {/* Money preview */}
              {winner && (winner==="none"||pts) && (() => {
                const realPts = pts===7?14:pts;
                const ptVal = (realPts||0)*activeDpp*(isLone?2:1);
                return (
                  <div style={S.moneyBox}>
                    <div style={{color:"#4ade80",fontSize:10,letterSpacing:2,marginBottom:6}}>MONEY PREVIEW</div>
                    {winner==="none"?<div style={{color:"#555"}}>No blood.</div>:
                      isLone?(winner==="captain"
                        ?<><div style={{color:"#e4ede4"}}>{realPts}pts × ${activeDpp} × 2 = <b>${ptVal}</b>/player</div><div style={{color:"#4ade80",marginTop:4}}>{captainPlayer?.name} collects <b>${ptVal*4}</b></div></>
                        :<><div style={{color:"#e4ede4"}}>{realPts}pts × ${activeDpp} × 2 = <b>${ptVal}</b>/player</div><div style={{color:"#f87171",marginTop:4}}>{captainPlayer?.name} pays <b>${ptVal*4}</b></div></>
                      ):captTeamOI.length===3?(
                        <><div style={{color:"#4ade80"}}>Winners each +<b>${ptVal}</b></div><div style={{color:"#f87171",marginTop:4}}>Losers split <b>-${ptVal*3}</b></div></>
                      ):(
                        <><div style={{color:"#f87171"}}>Losers each -<b>${ptVal}</b></div><div style={{color:"#4ade80",marginTop:4}}>Winners split <b>+${ptVal*3}</b></div></>
                      )
                    }
                    {pts===7&&<div style={{color:"#f59e0b",fontSize:11,marginTop:6}}>🔥 7 pts → 14</div>}
                  </div>
                );
              })()}
              <button style={{...S.btn,opacity:(winner==="none"||pts)?1:0.4}}
                onClick={() => { if(winner==="none"||pts) finalizeHole(); }}>
                {holeNum<18?`Confirm → Hole ${holeNum+1}`:"Finish Round"}
              </button>
              <button style={S.btnDark} onClick={() => setStep("captain")}>← Change Teams</button>
            </>
          )}
        </div>

        {/* Edit closed holes */}
        {holes.length > 0 && (
          <div style={{...S.card,marginTop:0}}>
            <div style={S.sec}>Edit Closed Holes</div>
            {holes.map((h, hIdx) => (
              <div key={hIdx}>
                {editingHole === hIdx ? (
                  <EditHoleForm h={h} hIdx={hIdx} orderPlayers={orderPlayers}
                    onSave={saveHoleEdit} onCancel={() => setEditingHole(null)} S={S} />
                ) : (
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"#080d08",borderRadius:8,padding:"8px 12px",marginBottom:6}}>
                    <div>
                      <span style={{fontSize:13,color:"#4ade80",fontWeight:700}}>H{h.hole}</span>
                      <span style={{fontSize:12,color:"#777",marginLeft:8}}>
                        {orderPlayers[h.captainOI]?.name}{h.partner==="alone"?" 🦅":h.partner!==null?` +${orderPlayers[h.partnerOI]?.name}`:""}
                      </span>
                      <span style={{fontSize:12,marginLeft:8,color:h.winner==="none"?"#444":h.winner==="captain"?"#4ade80":"#f87171"}}>
                        {h.winner==="none"?"No blood":`${h.winner==="captain"?"Capt":"Field"} ${h.pts}pts`}
                      </span>
                    </div>
                    <button style={{...S.btnGhost,fontSize:11,padding:"4px 10px"}} onClick={() => setEditingHole(hIdx)}>Edit</button>
                  </div>
                )}
              </div>
            ))}
          </div>
        )}

        {/* Edit handicaps */}
        <div style={{...S.card,marginTop:0,marginBottom:80}}>
          <div style={S.sec}>Handicaps (edit goes forward only)</div>
          {orderPlayers.map((p, oi) => (
            <div key={oi} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
              <span style={{flex:1,fontSize:13,color:"#aaa"}}>{p.name}</span>
              <input style={{...S.inp,width:70,marginBottom:0,textAlign:"center"}}
                type="number" step="0.1" defaultValue={p.index}
                onBlur={async e => {
                  const newIdx = e.target.value;
                  await savePlayer({ ...p, lastIndex: newIdx });
                }} />
              <span style={{fontSize:12,color:"#4ade80",minWidth:60}}>Hdcp {hdcpInfo?.courseHdcps[oi]}</span>
            </div>
          ))}
        </div>
      </div>
    );
  }

  if (screen === "summary") return (
    <SummaryScreen S={S} round={activeRound} holes={holes} ledger={ledger}
      orderPlayers={orderPlayers} players={players} pressLog={pressLog}
      setScreen={setScreen} fmt$={fmt$} />
  );

  return (
    <div style={S.root}>
      <div style={S.hdr}><div style={S.logo}>5-MAN</div><div style={S.logoSub}>CAPTAIN</div></div>
      <div style={{textAlign:"center",padding:40,color:"#555"}}>Loading...</div>
    </div>
  );
}

// ─── Login Screen (PIN-based) ─────────────────────────────────────────────────
function LoginScreen({ S, onLogin }) {
  const [mode, setMode] = useState("select"); // select | pin | register
  const [players, setPlayers] = useState([]);
  const [selectedPlayer, setSelectedPlayer] = useState(null);
  const [pin, setPin] = useState("");
  const [name, setName] = useState("");
  const [newPin, setNewPin] = useState("");
  const [confirmPin, setConfirmPin] = useState("");
  const [err, setErr] = useState("");
  const [loading, setLoading] = useState(false);

  useEffect(() => {
    db.collection("players").orderBy("name").get().then(snap => {
      setPlayers(snap.docs.map(d => ({ id: d.id, ...d.data() })));
    });
  }, []);

  async function handlePinLogin() {
    if (pin.length !== 4) { setErr("Enter your 4-digit PIN"); return; }
    setLoading(true); setErr("");
    const result = await pinSignIn(selectedPlayer.id, pin);
    setLoading(false);
    if (result.error) { setErr(result.error); return; }
    const user = { uid: selectedPlayer.id, name: selectedPlayer.name };
    localStorage.setItem("5mc_user", JSON.stringify(user));
    onLogin(user);
  }

  async function handleRegister() {
    if (!name.trim()) { setErr("Enter your name"); return; }
    if (newPin.length !== 4) { setErr("PIN must be 4 digits"); return; }
    if (newPin !== confirmPin) { setErr("PINs don't match"); return; }
    setLoading(true); setErr("");
    const result = await pinRegister(name.trim(), newPin);
    setLoading(false);
    if (result.error) { setErr(result.error); return; }
    const user = { uid: result.user.uid, name: result.user.name };
    localStorage.setItem("5mc_user", JSON.stringify(user));
    onLogin(user);
  }

  return (
    <div style={S.root}>
      <div style={S.hdr}><div style={S.logo}>5-MAN</div><div style={S.logoSub}>CAPTAIN AT THE CREEK</div></div>
      <div style={S.card}>
        <div style={{textAlign:"center",marginBottom:16}}>
          <div style={{fontSize:48,marginBottom:8}}>⛳</div>
          <div style={{fontSize:18,color:"#c5e8c5"}}>Welcome to 5-Man Captain</div>
        </div>

        {mode === "select" && (
          <>
            <div style={S.sec}>Who Are You?</div>
            {players.length === 0 && <div style={{color:"#555",marginBottom:10,fontSize:13}}>No players yet — register below.</div>}
            {players.map(p => (
              <button key={p.id} style={{...S.btnDark,marginTop:6,textAlign:"left",padding:"12px 14px"}}

// ─── Stats Screen ─────────────────────────────────────────────────────────────
function StatsScreen({ S, players, setScreen }) {
  const [tab, setTab] = useState("er"); // er | cer | wins | money

  const ranked = [...players].filter(p => p.rounds > 0).sort((a, b) => {
    if (tab === "er") {
      const erA = (a.totalHoles||0) > 0 ? (a.totalMoney||0) / a.totalHoles : -999;
      const erB = (b.totalHoles||0) > 0 ? (b.totalMoney||0) / b.totalHoles : -999;
      return erB - erA;
    }
    if (tab === "cer") {
      if ((a.captainHoles||0) < 10) return 1;
      if ((b.captainHoles||0) < 10) return -1;
      const cerA = (a.captainMoney||0) / a.captainHoles;
      const cerB = (b.captainMoney||0) / b.captainHoles;
      return cerB - cerA;
    }
    if (tab === "wins") return (b.wins||0) - (a.wins||0);
    return (b.totalMoney||0) - (a.totalMoney||0);
  });

  return (
    <div style={S.root}>
      <div style={S.hdr}><div style={S.logo}>5-MAN</div><div style={S.logoSub}>STATS & RANKINGS</div></div>
      <div style={S.card}>
        <div style={{display:"flex",gap:6,marginBottom:12}}>
          {[["er","Efficiency"],["cer","Captain ER"],["wins","Wins"],["money","Total $"]].map(([k,lbl]) => (
            <button key={k} style={{...S.btnGhost,flex:1,fontSize:11,padding:"8px 4px",...(tab===k?{border:"1px solid #4ade80",color:"#4ade80"}:{})}}
              onClick={() => setTab(k)}>{lbl}</button>
          ))}
        </div>
        {ranked.length === 0 && <div style={{color:"#555",textAlign:"center",padding:20}}>No stats yet.</div>}
        {ranked.map((p, i) => {
          const er = (p.totalHoles||0) > 0 ? ((p.totalMoney||0) / p.totalHoles).toFixed(2) : "—";
          const cer = (p.captainHoles||0) >= 10 ? ((p.captainMoney||0) / p.captainHoles).toFixed(2) : "< 10 holes";
          const val = tab==="er" ? `$${er}/hole` : tab==="cer" ? `$${cer}/hole` : tab==="wins" ? `${p.wins||0} wins` : fmt$(p.totalMoney||0);
          return (
            <div key={p.id} style={{...S.orderRow,cursor:"default",borderLeft:i===0?"3px solid #f59e0b":"3px solid #1a3a1a"}}>
              <span style={{color:i===0?"#f59e0b":"#4ade80",fontWeight:700,fontSize:18,minWidth:24}}>{i+1}</span>
              <div style={{flex:1}}>
                <div style={{fontSize:15}}>{p.name}</div>
                <div style={{fontSize:11,color:"#666"}}>{p.rounds||0} rounds · {p.captainHoles||0} captain holes</div>
              </div>
              <span style={{fontSize:15,fontWeight:700,color:"#e4ede4"}}>{val}</span>
            </div>
          );
        })}
      </div>
      <NavBar screen="stats" setScreen={setScreen} S={S} />
    </div>
  );
}

// ─── New Round Screen ─────────────────────────────────────────────────────────
function NewRoundScreen({ S, players, courses, user, onSaveCourse, onDeleteCourse, onStart }) {
  const [step, setStep] = useState("players");
  const [selPlayers, setSelPlayers] = useState(Array(5).fill(null));
  const [dpp, setDpp] = useState("");
  const [pressMode, setPressMode] = useState("custom");
  const [lightningRound, setLightningRound] = useState("16");
  const [courseData, setCourseData] = useState(null);
  const [manualMode, setManualMode] = useState(false);
  const [manual, setManual] = useState({ name:"", tee:"White", rating:"", slope:"", par:"72", holeHdcps:Array(18).fill(""), holePars:Array(18).fill("4") });
  const [query, setQuery] = useState("");
  const [results, setResults] = useState([]);
  const [searching, setSearching] = useState(false);
  const [searchErr, setSearchErr] = useState("");
  const [selectedClub, setSelectedClub] = useState(null);
  const [apiTees, setApiTees] = useState([]);

  const usedIds = selPlayers.filter(Boolean).map(p => p.id);
  const availablePlayers = players.filter(p => !usedIds.includes(p.id));

  async function doSearch() {
    if (!query.trim()) return;
    setSearching(true); setResults([]); setSearchErr("");
    try {
      const r = await fetch(`${GOLF_API}/courses?name=${encodeURIComponent(query)}`, { headers: { Authorization: `Key ${API_KEY}` } });
      if (!r.ok) { setSearchErr(`API error ${r.status}`); setSearching(false); return; }
      const d = await r.json();
      const list = d.courses || d.data || (Array.isArray(d) ? d : []);
      list.length ? setResults(list) : setSearchErr("Not found — try manual entry.");
    } catch { setSearchErr("Search failed — try manual entry."); }
    setSearching(false);
  }

  async function pickClub(club) {
    setSelectedClub(club); setResults([]);
    try {
      const r = await fetch(`${GOLF_API}/courses/${club.id||club.course_id}`, { headers: { Authorization: `Key ${API_KEY}` } });
      if (!r.ok) { setApiTees([]); return; }
      const d = await r.json();
      const c = d.course || d;
      setApiTees(c.tees || c.tee_boxes || []);
    } catch { setApiTees([]); }
  }

  function pickApiTee(tee) {
    const holes = tee.holes || [];
    const holeHdcps = holes.map(h => String(h.handicap||""));
    const holePars = holes.map(h => String(h.par||"4"));
    const par = holePars.reduce((s,p) => s+(parseInt(p)||4), 0);
    setCourseData({ name:selectedClub.club_name||selectedClub.name, tee:tee.tee_name, rating:String(tee.course_rating||""), slope:String(tee.slope_rating||""), par:String(par), holeHdcps, holePars });
  }

  const cd = manualMode ? manual : courseData;
  const hdcpPreview = cd && selPlayers.every(Boolean) ? computeHdcpInfo(cd, selPlayers) : null;

  if (step === "players") return (
    <div style={S.root}>
      <div style={S.hdr}><div style={S.logo}>5-MAN</div><div style={S.logoSub}>NEW ROUND</div></div>
      <div style={S.card}>
        <div style={S.sec}>Players — Enter in Tee Order</div>
        <div style={{fontSize:12,color:"#f59e0b",background:"#100a00",border:"1px solid #2a1a00",borderRadius:8,padding:"9px 12px",marginBottom:12}}>
          ⚠️ Select players 1–5 in tee order. Player 1 = Captain hole 1.
        </div>
        {selPlayers.map((p, i) => (
          <div key={i} style={{marginBottom:10}}>
            <div style={{fontSize:11,color:"#4ade80",marginBottom:4}}>#{i+1} in tee order</div>
            {p ? (
              <div style={{...S.orderRow,cursor:"default"}}>
                <span style={{flex:1,fontSize:14}}>{p.name}</span>
                <span style={{fontSize:12,color:"#4ade80"}}>Idx {p.lastIndex||p.index}</span>
                <button style={{...S.btnGhost,fontSize:11,padding:"4px 8px"}} onClick={() => { const np=[...selPlayers]; np[i]=null; setSelPlayers(np); }}>✕</button>
              </div>
            ) : (
              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                {players.filter(pl => !selPlayers.filter((_,si)=>si!==i).some(sp=>sp?.id===pl.id)).map(pl => (
                  <button key={pl.id} style={{...S.btnGhost,fontSize:13,padding:"8px 12px"}}
                    onClick={() => { const np=[...selPlayers]; np[i]=pl; setSelPlayers(np); }}>
                    {pl.name}
                  </button>
                ))}
              </div>
            )}
          </div>
        ))}
        <div style={S.sec}>Dollar Per Point</div>
        <input style={S.inp} placeholder="e.g. 3" type="number" step="0.5" value={dpp} onChange={e => setDpp(e.target.value)} />
        <div style={S.sec}>Press Style</div>
        <div style={S.row}>
          {[["custom","Custom"],["increment","Fixed +"],["double","Double"]].map(([k,lbl]) => (
            <button key={k} style={{...S.btnGhost,flex:1,fontSize:12,...(pressMode===k?{border:"1px solid #4ade80",color:"#4ade80"}:{})}}
              onClick={() => setPressMode(k)}>{lbl}</button>
          ))}
        </div>
        <div style={S.sec}>Lightning Round</div>
        <div style={S.row}>
          {[["16","Holes 16,17,18"],["14","Holes 14,17,18"]].map(([k,lbl]) => (
            <button key={k} style={{...S.btnGhost,flex:1,fontSize:13,...(lightningRound===k?{border:"1px solid #4ade80",color:"#4ade80"}:{})}}
              onClick={() => setLightningRound(k)}>{lbl}</button>
          ))}
        </div>
        <button style={{...S.btn,opacity:selPlayers.every(Boolean)&&dpp?1:0.4}}
          onClick={() => selPlayers.every(Boolean)&&dpp&&setStep("course")}>
          Next: Course →
        </button>
        <button style={S.btnDark} onClick={() => setStep("home")}>← Home</button>
      </div>
    </div>
  );

  if (step === "course") return (
    <div style={S.root}>
      <div style={S.hdr}><div style={S.logo}>5-MAN</div><div style={S.logoSub}>SELECT COURSE</div></div>
      <div style={S.card}>
        {courses.length > 0 && !courseData && !manualMode && (
          <>
            <div style={S.sec}>Saved Courses</div>
            {courses.map(c => (
              <div key={c.id} style={{...S.orderRow,cursor:"pointer"}} onClick={() => setCourseData(c)}>
                <div style={{flex:1}}>
                  <div style={{fontSize:14,color:"#e4ede4"}}>{c.name}</div>
                  <div style={{fontSize:11,color:"#666"}}>{c.tee} — Rtg {c.rating} / Slp {c.slope}</div>
                </div>
                <button style={{...S.btnGhost,fontSize:11,padding:"4px 8px"}} onClick={e => { e.stopPropagation(); onDeleteCourse(c.id); }}>✕</button>
              </div>
            ))}
            <div style={{borderBottom:"1px solid #1a3a1a",margin:"10px 0"}} />
          </>
        )}
        {!manualMode ? (
          <>
            <div style={S.sec}>Find Course</div>
            <div style={S.row}>
              <input style={{...S.inp,flex:1,marginBottom:0}} placeholder="Search course…" value={query}
                onChange={e => setQuery(e.target.value)} onKeyDown={e => e.key==="Enter"&&doSearch()} />
              <button style={S.btnSm} onClick={doSearch}>{searching?"…":"Search"}</button>
            </div>
            {searchErr && <div style={S.errBox}>{searchErr}</div>}
            {results.length>0&&!selectedClub&&results.slice(0,8).map((c,i) => (
              <div key={c.id||i} style={{...S.orderRow,cursor:"pointer"}} onClick={() => pickClub(c)}>
                <div>
                  <div style={{fontSize:14,color:"#e4ede4"}}>{c.club_name||c.name}</div>
                  <div style={{fontSize:11,color:"#666"}}>{c.city}{c.state?`, ${c.state}`:""}</div>
                </div>
              </div>
            ))}
            {selectedClub&&apiTees.length>0&&(
              <>
                <div style={{fontSize:13,color:"#4ade80",marginBottom:8}}>✓ {selectedClub.club_name||selectedClub.name}</div>
                <div style={S.sec}>Select Tees</div>
                {apiTees.map(t => (
                  <div key={t.tee_name} style={{...S.orderRow,cursor:"pointer",border:courseData?.tee===t.tee_name?"1px solid #4ade80":"1px solid #1a3a1a"}}
                    onClick={() => pickApiTee(t)}>
                    <div style={{flex:1}}>
                      <div style={{fontSize:14,color:"#e4ede4"}}>{t.tee_name}</div>
                      <div style={{fontSize:11,color:"#666"}}>Rtg {t.course_rating} / Slp {t.slope_rating}</div>
                    </div>
                    {courseData?.tee===t.tee_name&&<span style={{color:"#4ade80"}}>✓</span>}
                  </div>
                ))}
              </>
            )}
            <div style={{display:"flex",gap:8,marginTop:10}}>
              <button style={{...S.btnDark,flex:1,marginTop:0}} onClick={() => setStep("players")}>← Back</button>
              {courseData&&<button style={{...S.btn,flex:2,marginTop:0}} onClick={() => setStep("confirm")}>Next →</button>}
            </div>
            <button style={{...S.btnGhost,width:"100%",marginTop:8}} onClick={() => setManualMode(true)}>Enter manually</button>
          </>
        ) : (
          <>
            <div style={S.sec}>Manual Entry</div>
            <input style={S.inp} placeholder="Course name" value={manual.name} onChange={e => setManual({...manual,name:e.target.value})} />
            <div style={S.row}>
              {["Black","Blue","White","Gold","Red"].map(t => (
                <button key={t} style={{...S.teeBtn,...(manual.tee===t?S.teeBtnOn:{})}} onClick={() => setManual({...manual,tee:t})}>{t}</button>
              ))}
            </div>
            <div style={S.row}>
              <input style={{...S.inp,flex:1,marginBottom:0}} placeholder="Rating" type="number" value={manual.rating} onChange={e => setManual({...manual,rating:e.target.value})} />
              <input style={{...S.inp,flex:1,marginBottom:0}} placeholder="Slope" type="number" value={manual.slope} onChange={e => setManual({...manual,slope:e.target.value})} />
              <input style={{...S.inp,flex:1,marginBottom:0}} placeholder="Par" type="number" value={manual.par} onChange={e => setManual({...manual,par:e.target.value})} />
            </div>
            <div style={S.sec}>Hole Handicap Ratings</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(9,1fr)",gap:3}}>
              {Array.from({length:18},(_,i) => (
                <div key={i} style={S.holeCell}>
                  <div style={{fontSize:9,color:"#4ade80"}}>H{i+1}</div>
                  <input style={{width:"100%",background:"transparent",border:"none",borderTop:"1px solid #1a3a1a",color:"#e4ede4",padding:"3px 0",fontSize:11,textAlign:"center",outline:"none",fontFamily:"'Georgia',serif",marginTop:2}}
                    type="number" value={manual.holeHdcps[i]}
                    onChange={e => { const a=[...manual.holeHdcps]; a[i]=e.target.value; setManual({...manual,holeHdcps:a}); }} />
                </div>
              ))}
            </div>
            <div style={{display:"flex",gap:8,marginTop:12}}>
              <button style={{...S.btnDark,flex:1,marginTop:0}} onClick={() => setManualMode(false)}>← Back</button>
              <button style={{...S.btn,flex:2,marginTop:0}} onClick={async () => { await onSaveCourse(manual); setCourseData(manual); setStep("confirm"); }}>
                Save & Continue →
              </button>
            </div>
          </>
        )}
      </div>
    </div>
  );

  if (step === "confirm") return (
    <div style={S.root}>
      <div style={S.hdr}><div style={S.logo}>5-MAN</div><div style={S.logoSub}>CONFIRM ROUND</div></div>
      <div style={S.card}>
        <div style={S.sec}>Course Handicaps — {cd?.name} ({cd?.tee})</div>
        <div style={{fontSize:11,color:"#555",marginBottom:10}}>Low: {hdcpPreview?.low} — strokes relative to this.</div>
        {selPlayers.map((p,i) => (
          <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"#080d08",borderRadius:8,padding:"10px 12px",marginBottom:6}}>
            <div>
              <span style={{fontSize:15}}>{i+1}. {p.name}</span>
              <span style={{fontSize:11,color:"#888",marginLeft:8}}>Idx {p.lastIndex||p.index}</span>
            </div>
            <div style={{textAlign:"right"}}>
              <span style={{fontSize:15,color:"#4ade80",fontWeight:700}}>Hdcp {hdcpPreview?.courseHdcps[i]}</span>
              {hdcpPreview?.extras[i]>0&&<div style={{fontSize:11,color:"#f59e0b"}}>+{hdcpPreview.extras[i]} stroke{hdcpPreview.extras[i]>1?"s":""}</div>}
            </div>
          </div>
        ))}
        <div style={{background:"#080d08",borderRadius:8,padding:"10px 12px",marginTop:8}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
            <span style={{color:"#888"}}>$/pt</span><span style={{color:"#e4ede4"}}>${dpp}</span>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
            <span style={{color:"#888"}}>Press</span><span style={{color:"#e4ede4",textTransform:"capitalize"}}>{pressMode}</span>
          </div>
          <div style={{display:"flex",justifyContent:"space-between"}}>
            <span style={{color:"#888"}}>Lightning</span><span style={{color:"#f59e0b"}}>⚡ Holes {lightningRound==="14"?"14,17,18":"16,17,18"}</span>
          </div>
        </div>
        <button style={S.btn} onClick={() => onStart({
          playerOrder: selPlayers.map(p => p.id),
          players: selPlayers,
          orderPlayers: selPlayers,
          dpp: parseFloat(dpp),
          pressMode,
          lightningRound,
        }, cd)}>
          ⛳ Start Round
        </button>
        <button style={S.btnDark} onClick={() => setStep("course")}>← Back</button>
      </div>
    </div>
  );
}

// ─── Edit Hole Form ───────────────────────────────────────────────────────────
function EditHoleForm({ h, hIdx, orderPlayers, onSave, onCancel, S }) {
  const [winner, setWinner] = useState(h.winner);
  const [pts, setPts] = useState(h.pts===14?7:h.pts);
  const captTeamOI = h.partner==="alone" ? [h.captainOI] : [h.captainOI, h.partnerOI];
  const fieldOI = [0,1,2,3,4].filter(i => !captTeamOI.includes(i));
  return (
    <div style={{background:"#0a1a0a",border:"1px solid #4ade80",borderRadius:8,padding:"12px",marginBottom:8}}>
      <div style={{fontSize:13,color:"#4ade80",fontWeight:700,marginBottom:10}}>
        Editing Hole {h.hole} — {orderPlayers[h.captainOI]?.name}{h.partner==="alone"?" 🦅 Lone":h.partnerOI!==null?` + ${orderPlayers[h.partnerOI]?.name}`:""}
      </div>
      <div style={{display:"flex",gap:6,marginBottom:10}}>
        {[{k:"captain",lbl:"Captain's Team",sub:captTeamOI.map(oi=>orderPlayers[oi]?.name).join(" & ")},
          {k:"field",lbl:"Field",sub:fieldOI.map(oi=>orderPlayers[oi]?.name).join(" & ")},
          {k:"none",lbl:"No Blood",sub:""}].map(({k,lbl,sub}) => (
          <button key={k} style={{flex:k==="none"?0.7:1,background:winner===k?"#162616":"#0a130a",border:winner===k?"2px solid #4ade80":"1px solid #1e3a1e",borderRadius:8,color:winner===k?"#e4ede4":"#bbb",padding:"10px 4px",fontSize:11,cursor:"pointer",fontFamily:"'Georgia',serif",textAlign:"center"}}
            onClick={() => { setWinner(k); if(k==="none")setPts(null); }}>
            <div style={{fontWeight:700}}>{lbl}</div>
            {sub&&<div style={{fontSize:9,color:"#666",marginTop:2}}>{sub}</div>}
          </button>
        ))}
      </div>
      {winner&&winner!=="none"&&(
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:10}}>
          {[1,2,3,4,5,6,7].map(p => (
            <button key={p} style={{background:pts===p?"#162616":"#0a130a",border:pts===p?"2px solid #4ade80":"1px solid #1e3a1e",borderRadius:8,color:pts===p?"#e4ede4":"#bbb",padding:"11px 2px",fontSize:18,cursor:"pointer",fontFamily:"'Georgia',serif",textAlign:"center"}}
              onClick={() => setPts(p)}>
              {p}{p===7&&<div style={{fontSize:8,color:"#f59e0b",marginTop:1}}>×2</div>}
            </button>
          ))}
        </div>
      )}
      <div style={{display:"flex",gap:8}}>
        <button style={{flex:2,background:"linear-gradient(135deg,#1a5c1a,#267a26)",border:"none",borderRadius:8,color:"#e4ede4",padding:"11px",fontSize:14,fontFamily:"'Georgia',serif",cursor:"pointer",opacity:(winner==="none"||pts)?1:0.4}}
          onClick={() => { if(winner==="none"||pts) onSave(hIdx,{winner,pts:pts===7?14:pts}); }}>
          Save & Recalculate
        </button>
        <button style={{flex:1,background:"#111a11",border:"1px solid #1a3a1a",borderRadius:8,color:"#666",padding:"11px",fontSize:13,fontFamily:"'Georgia',serif",cursor:"pointer"}}
          onClick={onCancel}>Cancel</button>
      </div>
    </div>
  );
}

// ─── Nav Bar ──────────────────────────────────────────────────────────────────
function NavBar({ screen, setScreen, S }) {
  const tabs = [["home","🏠","Home"],["newround","⛳","Round"],["history","📋","History"],["stats","📊","Stats"],["roster","👤","Roster"]];
  return (
    <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"#0a130a",borderTop:"1px solid #1a3a1a",display:"flex",zIndex:100}}>
      {tabs.map(([s,icon,lbl]) => (
        <button key={s} style={{flex:1,background:"transparent",border:"none",borderTop:screen===s?"2px solid #4ade80":"2px solid transparent",color:screen===s?"#4ade80":"#444",padding:"10px 4px 8px",fontSize:10,cursor:"pointer",fontFamily:"'Georgia',serif",letterSpacing:0.5}}
          onClick={() => setScreen(s)}>
          <div style={{fontSize:16}}>{icon}</div>{lbl}
        </button>
      ))}
    </div>
  );
}

// ─── Mount ────────────────────────────────────────────────────────────────────
document.getElementById('loading').style.display = 'none';
const container = document.getElementById('root');
const root = ReactDOM.createRoot(container);
root.render(React.createElement(FiveManCaptain));

  </script>

</body>
