// ── Helpers ───────────────────────────────────────────────────────────────────
function $(id){return document.getElementById(id)}
function fmt(n){if(!n||n===0)return'$0';const r=Math.round(n);return(r<0?'-$':'+$')+Math.abs(r)}
function calcHdcp(idx,slope,rating,par){return Math.round(parseFloat(idx||0)*(parseFloat(slope||113)/113)+(parseFloat(rating||72)-parseFloat(par||72)))}
function strokeHoles(extra,hdcps){
  if(extra<=0)return[];
  return [...hdcps].map((h,i)=>({hole:i+1,hdcp:parseInt(h)||i+1})).sort((a,b)=>a.hdcp-b.hdcp).slice(0,extra).map(h=>h.hole);
}
function whosBehind(pis,ledger,hdcps){
  const[a,b]=pis;
  if(ledger[a]!==ledger[b])return ledger[a]<ledger[b]?[a,b]:[b,a];
  return(hdcps?(hdcps[a]||0):(0))>=(hdcps?(hdcps[b]||0):(0))?[a,b]:[b,a];
}
function splitWin(total,pis,ledger,hdcps){
  const c=Math.round(total*100);const hi=Math.ceil(c/200);const lo=Math.floor(c/200);
  const[f,o]=whosBehind(pis,ledger,hdcps);return{[f]:hi,[o]:lo};
}
function splitLoss(total,pis,ledger,hdcps){
  const c=Math.round(total*100);const hi=Math.ceil(c/200);const lo=Math.floor(c/200);
  const[f,o]=whosBehind(pis,ledger,hdcps);return{[f]:lo,[o]:hi};
}
function applyMoney(h,ledger,dpp,hdcps){
  const pts=h.pts===7?14:(h.pts||0);
  if(!h.winner||h.winner==='none'||pts===0)return[...ledger];
  const ptVal=pts*dpp*(h.partner==='alone'?2:1);
  const captTeam=h.partner==='alone'?[h.captOI]:[h.captOI,h.partOI];
  const field=[0,1,2,3,4].filter(i=>!captTeam.includes(i));
  const win=h.winner==='captain'?captTeam:field;
  const lose=h.winner==='captain'?field:captTeam;
  const nl=[...ledger];
  if(win.length===1&&lose.length===4){lose.forEach(i=>{nl[i]-=ptVal});nl[win[0]]+=ptVal*4}
  else if(win.length===4&&lose.length===1){nl[lose[0]]-=ptVal*4;win.forEach(i=>{nl[i]+=ptVal})}
  else if(win.length===3&&lose.length===2){
    win.forEach(i=>{nl[i]+=ptVal});
    const sp=splitLoss(ptVal*3,lose,nl,hdcps);lose.forEach(i=>{nl[i]-=sp[i]});
  }else if(win.length===2&&lose.length===3){
    lose.forEach(i=>{nl[i]-=ptVal});
    const sp=splitWin(ptVal*3,win,nl,hdcps);win.forEach(i=>{nl[i]+=sp[i]});
  }
  const tot=nl.reduce((s,v)=>s+Math.round(v*100),0);
  if(tot!==0)nl[win[0]]-=tot/100;
  nl.forEach((v,i)=>{nl[i]=Math.round(v)});
  return nl;
}
function settle(players,ledger){
  const c=players.map((p,i)=>({...p,bal:Math.round(ledger[i]||0)}));
  const cr=c.filter(p=>p.bal>0).sort((a,b)=>b.bal-a.bal).map(p=>({...p,rem:p.bal}));
  const dt=c.filter(p=>p.bal<0).sort((a,b)=>a.bal-b.bal).map(p=>({...p,rem:Math.abs(p.bal)}));
  const txns=[];let ci=0,di=0;
  while(ci<cr.length&&di<dt.length){
    const amt=Math.min(cr[ci].rem,dt[di].rem);
    if(amt>0)txns.push({from:dt[di],to:cr[ci],amount:amt});
    cr[ci].rem-=amt;dt[di].rem-=amt;
    if(cr[ci].rem===0)ci++;if(dt[di].rem===0)di++;
  }
  return txns;
}
function payLink(method,handle,amount,note){
  const e=encodeURIComponent;
  if(method==='venmo')return`venmo://paycharge?txn=pay&recipients=${e(handle)}&amount=${amount}&note=${e(note)}&audience=private`;
  if(method==='cashapp')return`cashapp://cash.app/${handle.startsWith('$')?handle:'$'+handle}?amount=${amount}`;
  if(method==='paypal')return`https://paypal.me/${handle.replace('@','')}/${amount}`;
  return null;
}

// ── PIN Auth ──────────────────────────────────────────────────────────────────
async function pinSignIn(pid,pin){
  const s=await db.collection('players').doc(pid).get();
  if(!s.exists)return{error:'Player not found'};
  const d=s.data();
  if(!d.pin)return{error:'No PIN set — register first'};
  if(d.pin!==pin)return{error:'Wrong PIN'};
  return{user:{uid:pid,name:d.name}};
}
async function pinRegister(name,pin){
  const s=await db.collection('players').where('name','==',name).limit(1).get();
  if(!s.empty){
    await db.collection('players').doc(s.docs[0].id).update({pin});
    return{user:{uid:s.docs[0].id,name}};
  }
  const ref=await db.collection('players').add({name,pin,rounds:0,wins:0,totalMoney:0,totalHoles:0,captainHoles:0,captainMoney:0});
  return{user:{uid:ref.id,name}};
}

function listenRound(id){

  unsubRound=db.collection('rounds').doc(id).onSnapshot(doc=>{
    if(!doc.exists)return;
    const r={id:doc.id,...doc.data()};
    STATE.round=r;
    STATE.holes=r.holes||[];
    if(STATE.holes.length>0)STATE.ledger=[...(STATE.holes[STATE.holes.length-1].ledgerAfter||[0,0,0,0,0])];
    if(r.activeDpp)STATE.dpp=r.activeDpp;
    if(r.status==='complete')STATE.curHole=18;
    else STATE.curHole=STATE.holes.length;
    render();
  });
}
async function savePlayer(p){

async function saveCourse(c){

function genCode(){
  const w=['CREEK','EAGLE','BIRDIE','BOGEY','FLAG','GREEN'];
  return w[Math.floor(Math.random()*w.length)]+'-'+Math.floor(Math.random()*90+10);
}
async function createRound(data,cd){
  const code=genCode();
  const ref=await db.collection('rounds').add({...data,courseData:cd,gameCode:code,status:'active',holes:[],activeDpp:data.dpp,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
  return{id:ref.id,gameCode:code};
}

// ── Captain logic ─────────────────────────────────────────────────────────────
function lightningHoles(){return STATE.round?.lightningRound==='14'?[13,16,17]:[15,16,17]}
function isLightning(hi){return lightningHoles().includes(hi)}
function fixedCaptain(hi){
  if(STATE.round?.lightningRound!=='14')return null;
  if(hi===14)return 3;if(hi===15)return 4;return null;
}
function captainFor(hi,led,passed){
  const fc=fixedCaptain(hi);if(fc!==null)return fc;
  if(isLightning(hi)){
    const el=[0,1,2,3,4].filter(i=>!passed.includes(i));
    if(!el.length)return hi%5;
    return[...el].sort((a,b)=>led[a]-led[b])[0];
  }
  return hi%5;
}

// ── Hole finalization ─────────────────────────────────────────────────────────
async function finalizeHole(){
  const hi=STATE.curHole;
  const captOI=captainFor(hi,STATE.ledger,STATE.passed);
  const partOI=STATE.partner==='alone'?null:STATE.partner;
  const cd=STATE.round?.courseData;
  const hdcps=cd&&STATE.hdcpInfo?STATE.hdcpInfo.courseHdcps:null;
  const hRec={hole:hi+1,captOI,partOI,partner:STATE.partner,winner:STATE.winner,pts:STATE.pts===7?14:(STATE.pts||0),dpp:STATE.dpp,ledgerAfter:null};
  const nl=applyMoney(hRec,STATE.ledger,STATE.dpp,hdcps);
  hRec.ledgerAfter=nl;
  const newHoles=[...STATE.holes,hRec];
  await db.collection('rounds').doc(STATE.roundId).update({holes:newHoles,activeDpp:STATE.dpp,ledger:nl});
  if(hi>=17){
    await db.collection('rounds').doc(STATE.roundId).update({status:'complete',finalLedger:nl,results:STATE.round.playerOrder.map((pid,i)=>({playerId:pid,name:STATE.players.find(p=>p.id===pid)?.name||'?',money:nl[i]})),completedAt:firebase.firestore.FieldValue.serverTimestamp()});
    setState({screen:'summary'});
  } else {
    resetHole();
  }
}
async function saveEdit(hIdx,updates){
  const newHoles=[...STATE.holes];
  newHoles[hIdx]={...newHoles[hIdx],...updates};
  const cd=STATE.round?.courseData;
  const hdcps=cd&&STATE.hdcpInfo?STATE.hdcpInfo.courseHdcps:null;
  let runLed=hIdx===0?[0,0,0,0,0]:[...(newHoles[hIdx-1].ledgerAfter||[0,0,0,0,0])];
  for(let i=hIdx;i<newHoles.length;i++){
    runLed=applyMoney(newHoles[i],runLed,newHoles[i].dpp||STATE.dpp,hdcps);
    newHoles[i]={...newHoles[i],ledgerAfter:[...runLed]};
  }
  await db.collection('rounds').doc(STATE.roundId).update({holes:newHoles,ledger:runLed});
  setState({editHole:null});
}
function resetHole(){setState({step:'captain',partner:null,winner:null,pts:null,showPress:false,presser:null,pressVal:'',passed:[],editHole:null})}

// ── Render engine (vanilla DOM) ───────────────────────────────────────────────
function el(tag,attrs,children){
  const e=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==='style'&&typeof v==='object')Object.assign(e.style,v);
    else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='className')e.className=v;
    else if(k==='htmlFor')e.htmlFor=v;
    else if(k==='value')e.value=v;
    else if(k==='placeholder')e.placeholder=v;
    else if(k==='type')e.type=v;
    else if(k==='maxLength')e.maxLength=v;
    else if(k==='inputMode')e.inputMode=v;
    else if(k==='href'){e.href=v;e.target='_blank';e.rel='noreferrer';}
    else e.setAttribute(k,v);
  });
  if(children)flatAppend(e,children);
  return e;
}
function flatAppend(parent,children){
  if(Array.isArray(children))children.forEach(c=>flatAppend(parent,c));
  else if(children===null||children===undefined||children===false){}
  else if(typeof children==='string'||typeof children==='number')parent.appendChild(document.createTextNode(children));
  else parent.appendChild(children);
}
function div(cls,children,style){return el('div',{className:cls||'',style:style||{}},children)}
function btn(cls,text,onClick,style){return el('button',{className:cls,onClick,style:style||{}},text)}
function inp(type,placeholder,value,onInput,extra){
  const e=el('input',{type,placeholder,value:value||'',onInput,...(extra||{})});
  return e;
}

  let pin='',name='',newPin='',confPin='';

    // Header
    const htop=div('',null,{textAlign:'center',marginBottom:'16px'});
    htop.appendChild(div('',['⛳'],{fontSize:'48px',marginBottom:'8px'}));
    htop.appendChild(div('',['Welcome to 5-Man Captain'],{fontSize:'18px',color:'#c5e8c5'}));
    wrap.appendChild(htop);

    if(mode==='select'){
      wrap.appendChild(div('sec',['Who Are You?']));
      if(STATE.players.length===0){
        wrap.appendChild(div('',['No players yet — tap New Player below'],{color:'#555',fontSize:'13px',marginBottom:'10px'}));
      }
      STATE.players.forEach(p=>{
        const b=btn('btnd',p.name,()=>{selPlayer=p;mode='pin';pin='';draw()});
        wrap.appendChild(b);
      });
      wrap.appendChild(btn('btn','+ New Player / First Time',()=>{mode='register';draw()}));
    }
    else if(mode==='pin'){
      wrap.appendChild(div('sec',['Enter PIN — '+selPlayer.name]));
      const i=inp('password','••••',pin,e=>{pin=e.target.value.replace(/\D/g,'').slice(0,4);draw()},{maxLength:4,inputMode:'numeric',style:{fontSize:'24px',textAlign:'center',letterSpacing:'12px'}});
      wrap.appendChild(i);
      const errDiv=div('err',[]);errDiv.style.display='none';wrap.appendChild(errDiv);
      wrap.appendChild(btn('btn',pin.length===4?'Sign In':'Enter PIN',async()=>{
        if(pin.length!==4)return;
        const r=await pinSignIn(selPlayer.id,pin);
        if(r.error){errDiv.textContent=r.error;errDiv.style.display='block';return;}
        const u={uid:selPlayer.id,name:selPlayer.name};
        localStorage.setItem('5mc_user',JSON.stringify(u));
        setState({user:u,screen:'home'});
        listenPlayers();
      },{opacity:pin.length===4?'1':'0.5'}));
      wrap.appendChild(btn('btnd','← Back',()=>{mode='select';draw()}));
    }
    else if(mode==='register'){
      wrap.appendChild(div('sec',['Create Your Profile']));
      wrap.appendChild(inp('text','Your name',name,e=>{name=e.target.value}));
      wrap.appendChild(inp('password','Create 4-digit PIN',newPin,e=>{newPin=e.target.value.replace(/\D/g,'').slice(0,4)},{maxLength:4,inputMode:'numeric',style:{fontSize:'20px',textAlign:'center',letterSpacing:'8px'}}));
      wrap.appendChild(inp('password','Confirm PIN',confPin,e=>{confPin=e.target.value.replace(/\D/g,'').slice(0,4)},{maxLength:4,inputMode:'numeric',style:{fontSize:'20px',textAlign:'center',letterSpacing:'8px'}}));
      const errDiv=div('err',[]);errDiv.style.display='none';wrap.appendChild(errDiv);
      wrap.appendChild(btn('btn','Create Profile',async()=>{
        // read values fresh from DOM
        const inputs=wrap.querySelectorAll('input');
        const n=inputs[0].value.trim();
        const p1=inputs[1].value;
        const p2=inputs[2].value;
        if(!n){errDiv.textContent='Enter your name';errDiv.style.display='block';return;}
        if(p1.length!==4){errDiv.textContent='PIN must be 4 digits';errDiv.style.display='block';return;}
        if(p1!==p2){errDiv.textContent="PINs don't match";errDiv.style.display='block';return;}
        const r=await pinRegister(n,p1);
        if(r.error){errDiv.textContent=r.error;errDiv.style.display='block';return;}
        const u={uid:r.user.uid,name:r.user.name};
        localStorage.setItem('5mc_user',JSON.stringify(u));
        setState({user:u,screen:'home'});
        listenPlayers();
      }));
      wrap.appendChild(btn('btnd','← Back',()=>{mode='select';draw()}));
    }
    s.appendChild(wrap);
  }
  draw();
  return s;
}

function renderHome(){
  const wrap=div('');
  wrap.appendChild(div('card',[]));

  // User greeting
  const greet=div('',['👤 '+STATE.user?.name],{fontSize:'11px',color:'#4ade80',textAlign:'center',padding:'4px 0'});

  const card=div('card');
  card.appendChild(btn('btn','⛳ New Round',()=>{setState({screen:'newround'})}));

  // Join round
  card.appendChild(div('sec',['Join a Round']));
  const joinRow=div('row');
  const codeInp=inp('text','Game code (e.g. CREEK-42)','',null,{style:{flex:'1',marginBottom:'0'}});
  const joinErr=div('err',[]);joinErr.style.display='none';
  joinRow.appendChild(codeInp);
  joinRow.appendChild(btn('btnsm','Join',async()=>{
    const code=codeInp.value.trim().toUpperCase();
    if(!code)return;
    const s=await db.collection('rounds').where('gameCode','==',code).limit(1).get();
    if(s.empty){joinErr.textContent='Game not found';joinErr.style.display='block';return;}
    const r={id:s.docs[0].id,...s.docs[0].data()};
    STATE.round=r;STATE.roundId=r.id;STATE.isKeeper=false;
    listenRound(r.id);
    setState({screen:'spectate'});
  }));
  card.appendChild(joinRow);
  card.appendChild(joinErr);

  card.appendChild(btn('btnd','👤 Player Roster',()=>setState({screen:'roster'})));
  card.appendChild(btn('btnd','📋 Round History',()=>{loadHistory();setState({screen:'history'})}));
  card.appendChild(btn('btnd','📊 Stats & Rankings',()=>setState({screen:'stats'})));
  card.appendChild(btn('btnd','Sign Out',()=>{localStorage.removeItem('5mc_user');setState({user:null,screen:'login'})}));
  wrap.appendChild(greet);
  wrap.appendChild(card);

  // Last round
  if(STATE.history.length>0){
    const r=STATE.history[0];
    const hcard=div('card');
    hcard.appendChild(div('sec',['Last Round']));
    hcard.appendChild(div('',[(r.courseData?.name||'')],{fontSize:'12px',color:'#666',marginBottom:'6px'}));
    (r.results||[]).sort((a,b)=>b.money-a.money).forEach((p,i)=>{
      const row=div('row');
      row.appendChild(div('',[ p.name],{flex:'1',fontSize:'14px',color:i===0?'#f59e0b':'#e4ede4'}));
      row.appendChild(div('',[fmt(p.money)],{fontWeight:'700',color:p.money>=0?'#4ade80':'#f87171'}));
      hcard.appendChild(row);
    });
    wrap.appendChild(hcard);
  }
  wrap.appendChild(renderNavBar('home'));
  return wrap;
}

  existing.appendChild(div('sec',[p?'Edit Player':'Add Player']));

  const idxInp=inp('number','Handicap Index',p?.lastIndex||p?.index||'',null,{style:{marginBottom:'8px'}});
  idxInp.step='0.1';
  existing.appendChild(nameInp);existing.appendChild(idxInp);

  existing.appendChild(div('sec',['Payment']));
  const methods=['venmo','cashapp','paypal','zelle','applepay','cash'];
  let selMethod=p?.paymentMethod||'cash';
  const mrow=div('row');
  methods.forEach(m=>{
    const b=btn('btng',PAY_LABELS[m],()=>{selMethod=m;b.style.borderColor='#4ade80';b.style.color='#4ade80'});
    if(m===selMethod){b.style.borderColor='#4ade80';b.style.color='#4ade80';}

function renderStats(){
  const wrap=div('');
  const hdr=div('hdr');hdr.appendChild(div('logo',['5-MAN']));hdr.appendChild(div('sub',['STATS']));
  wrap.appendChild(hdr);

  let tab='er';
  const card=div('card');

  function drawStats(){
    card.innerHTML='';
    const tabs=div('row');
    [['er','Efficiency'],['cer','Captain ER'],['wins','Wins'],['money','Total $']].forEach(([k,lbl])=>{
      const b=btn('btng',lbl,()=>{tab=k;drawStats()},{flex:'1',fontSize:'11px',padding:'8px 4px',...(tab===k?{borderColor:'#4ade80',color:'#4ade80'}:{})});
      tabs.appendChild(b);
    });
    card.appendChild(tabs);

    const ranked=[...STATE.players].filter(p=>p.rounds>0).sort((a,b)=>{
      if(tab==='er'){const ea=(a.totalHoles||0)>0?(a.totalMoney||0)/a.totalHoles:-999;const eb=(b.totalHoles||0)>0?(b.totalMoney||0)/b.totalHoles:-999;return eb-ea;}
      if(tab==='cer'){if((a.captainHoles||0)<10)return 1;if((b.captainHoles||0)<10)return -1;return((b.captainMoney||0)/b.captainHoles)-((a.captainMoney||0)/a.captainHoles);}
      if(tab==='wins')return(b.wins||0)-(a.wins||0);
      return(b.totalMoney||0)-(a.totalMoney||0);
    });

    if(ranked.length===0){card.appendChild(div('',['No stats yet'],{color:'#555',textAlign:'center',padding:'20px'}));return;}

    ranked.forEach((p,i)=>{
      const er=(p.totalHoles||0)>0?((p.totalMoney||0)/p.totalHoles).toFixed(2):'—';
      const cer=(p.captainHoles||0)>=10?((p.captainMoney||0)/p.captainHoles).toFixed(2):'<10 holes';
      const val=tab==='er'?'$'+er+'/h':tab==='cer'?'$'+cer+'/h':tab==='wins'?(p.wins||0)+' W':fmt(p.totalMoney||0);
      const row=div('orow',null,{cursor:'default',borderLeft:i===0?'3px solid #f59e0b':'3px solid #1a3a1a'});
      row.appendChild(div('',[i+1],{color:i===0?'#f59e0b':'#4ade80',fontWeight:'700',fontSize:'18px',minWidth:'24px'}));
      const info=div('',null,{flex:'1'});
      info.appendChild(div('',[p.name],{fontSize:'15px'}));
      info.appendChild(div('',[(p.rounds||0)+' rds · '+(p.captainHoles||0)+' capt holes'],{fontSize:'11px',color:'#666'}));
      row.appendChild(info);
      row.appendChild(div('',[val],{fontSize:'15px',fontWeight:'700',color:'#e4ede4'}));
      card.appendChild(row);
    });
  }
  drawStats();
  wrap.appendChild(card);
  wrap.appendChild(renderNavBar('stats'));
  return wrap;
}

async function doSearch(){
  const qi=document.querySelector('#app input[placeholder="Search course…"]');
  const q=qi?qi.value.trim():NR.query;
  if(!q)return;NR.query=q;
  try{
    const r=await fetch(GOLF_API+'/courses?name='+encodeURIComponent(q),{headers:{Authorization:'Key '+GOLF_KEY}});
    const d=await r.json();
    NR.results=d.courses||d.data||(Array.isArray(d)?d:[]);
  }catch{NR.results=[];}
  render();
}

function computeHdcpForPlayers(cd,players){
  const par=parseInt(cd.par)||72;
  const slope=parseFloat(cd.slope)||113;
  const rating=parseFloat(cd.rating)||par;
  const courseHdcps=players.map(p=>calcHdcp(p.lastIndex||p.index||0,slope,rating,par));
  const low=Math.min(...courseHdcps);
  const extras=courseHdcps.map(ch=>Math.max(0,ch-low));
  const sHoles=extras.map(e=>strokeHoles(e,cd.holeHdcps||[]));
  return{courseHdcps,low,extras,sHoles};
}

    } else {
      pz.appendChild(div('',['WHO IS PRESSING?'],{fontSize:'10px',color:'#f59e0b',letterSpacing:'2px',marginBottom:'8px'}));
      const negPlayers=[0,1,2,3,4].filter(i=>STATE.ledger[i]<0);
      if(negPlayers.length===0){pz.appendChild(div('',['No one is negative'],{fontSize:'12px',color:'#666'}));}
      const prow=div('row');
      negPlayers.forEach(oi=>{
        prow.appendChild(btn('btng',orderPlayers[oi]?.name||'?',()=>setState({presser:oi}),{...(STATE.presser===oi?{borderColor:'#f59e0b',color:'#f59e0b'}:{})}));
      });
      pz.appendChild(prow);
      if(STATE.presser!==null){

          pz.appendChild(pi);
          pz.appendChild(btn('btn','Set',async()=>{
            const nv=parseFloat(pi.value);if(!nv)return;
            STATE.pressLog.push({hole:hNum,presser:STATE.presser,fromDpp:STATE.dpp,toDpp:nv});
            STATE.dpp=nv;
            await db.collection('rounds').doc(STATE.roundId).update({activeDpp:nv});
            setState({showPress:false,presser:null,pressVal:''});
          }));
        } else {
          const orig=parseFloat(STATE.round.dpp||1);
          const nv=STATE.round.pressMode==='double'?STATE.dpp*2:STATE.dpp+orig;
          pz.appendChild(div('',['$'+STATE.dpp+' → $'+nv+'/pt'],{fontSize:'13px',color:'#e4ede4',marginBottom:'8px'}));
          pz.appendChild(btn('btn','Confirm Press',async()=>{
            STATE.pressLog.push({hole:hNum,presser:STATE.presser,fromDpp:STATE.dpp,toDpp:nv});
            STATE.dpp=nv;
            await db.collection('rounds').doc(STATE.roundId).update({activeDpp:nv});
            setState({showPress:false,presser:null});
          }));
        }
      }
      pz.appendChild(btn('btnd','Cancel',()=>setState({showPress:false,presser:null})));
    }
    card.appendChild(pz);
  }

  // Step 1: Captain picks
  if(STATE.step==='captain'){
    card.appendChild(div('sec',['⛳ '+captName+' is Captain'+(isLightning(hi)?' ⚡':'')+((fixedCaptain(hi)!==null)?' (fixed)':'')]));
    if(isLightning(hi)){
      card.appendChild(btn('btng','Pass → next biggest loser',()=>{STATE.passed=[...STATE.passed,captOI];render()},{width:'100%',marginBottom:'10px'}));
    }
    // Strokes
    const srow=div('row',null,{marginBottom:'12px',flexWrap:'wrap'});
    orderPlayers.forEach((p,oi)=>{
      srow.appendChild(div('',[(p.name?.split(' ')[0]||'?')+' '+(strokesHere[oi]?'+1':'—')],{fontSize:'12px',color:strokesHere[oi]?'#f59e0b':'#444',background:strokesHere[oi]?'#1a1000':'#080d08',borderRadius:'6px',padding:'4px 8px',border:strokesHere[oi]?'1px solid #3a2000':'1px solid #1a3a1a'}));
    });
    card.appendChild(srow);

    // Partner buttons
    const bwrap=div('',null,{display:'flex',flexWrap:'wrap',gap:'6px'});
    const lone=btn('pickbtn'+(STATE.partner==='alone'?' on':''),'🦅 Lone Captain\n2×',()=>setState({partner:'alone'}));
    lone.style.minWidth='100%';bwrap.appendChild(lone);
    [0,1,2,3,4].filter(oi=>oi!==captOI).forEach(oi=>{
      const b=btn('pickbtn'+(STATE.partner===oi?' on':''),orderPlayers[oi]?.name+(strokesHere[oi]?' +1':''),()=>setState({partner:oi}));
      bwrap.appendChild(b);
    });
    card.appendChild(bwrap);

    if(STATE.partner!==null){
      const captTeam=STATE.partner==='alone'?[captOI]:[captOI,STATE.partner];
      const field=[0,1,2,3,4].filter(i=>!captTeam.includes(i));
      const tbox=div('',null,{display:'flex',gap:'8px',margin:'12px 0'});
      const ct=div('',null,{flex:'1',background:'#080d08',borderRadius:'8px',padding:'10px 12px'});
      ct.appendChild(div('',['CAPT\'S TEAM'],{fontSize:'9px',letterSpacing:'2px',color:'#4ade80',marginBottom:'4px'}));
      captTeam.forEach(oi=>ct.appendChild(div('',[orderPlayers[oi]?.name||'?'],{fontSize:'14px',color:'#c5e8c5'})));
      const ft=div('',null,{flex:'1',background:'#080d08',borderRadius:'8px',padding:'10px 12px'});
      ft.appendChild(div('',['FIELD'],{fontSize:'9px',letterSpacing:'2px',color:'#888',marginBottom:'4px'}));
      field.forEach(oi=>ft.appendChild(div('',[orderPlayers[oi]?.name||'?'],{fontSize:'14px',color:'#aaa'})));
      tbox.appendChild(ct);tbox.appendChild(ft);card.appendChild(tbox);
      card.appendChild(btn('btn','Enter Result →',()=>setState({step:'result'})));
    }
  }

  // Step 2: Result
  if(STATE.step==='result'){
    const captTeam=STATE.partner==='alone'?[captOI]:[captOI,STATE.partner];
    const field=[0,1,2,3,4].filter(i=>!captTeam.includes(i));
    card.appendChild(div('sec',['Who Won Hole '+hNum+'?']));

    const tbox=div('',null,{display:'flex',gap:'8px',marginBottom:'14px'});
    const ct=div('',null,{flex:'1',background:'#080d08',borderRadius:'8px',padding:'10px 12px'});
    ct.appendChild(div('',["CAPT'S TEAM"],{fontSize:'9px',letterSpacing:'2px',color:'#4ade80',marginBottom:'4px'}));
    captTeam.forEach(oi=>ct.appendChild(div('',[orderPlayers[oi]?.name||'?'],{fontSize:'13px',color:'#c5e8c5'})));
    const ft=div('',null,{flex:'1',background:'#080d08',borderRadius:'8px',padding:'10px 12px'});
    ft.appendChild(div('',['FIELD'],{fontSize:'9px',letterSpacing:'2px',color:'#888',marginBottom:'4px'}));
    field.forEach(oi=>ft.appendChild(div('',[orderPlayers[oi]?.name||'?'],{fontSize:'13px',color:'#aaa'})));
    tbox.appendChild(ct);tbox.appendChild(ft);card.appendChild(tbox);

    const wrow=div('row');
    [{k:'captain',l:"Captain's Team"},{k:'field',l:'Field'},{k:'none',l:'No Blood'}].forEach(({k,l})=>{
      wrow.appendChild(btn('winbtn'+(STATE.winner===k?' on':''),l,()=>setState({winner:k,pts:k==='none'?null:STATE.pts}),{flex:k==='none'?'0.7':'1'}));
    });
    card.appendChild(wrow);

    if(STATE.winner&&STATE.winner!=='none'){
      card.appendChild(div('sec',['How Many Points?']));
      const pgrid=div('',null,{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:'5px',margin:'8px 0'});
      [1,2,3,4,5,6,7].forEach(p=>{
        const b=btn('ptbtn'+(STATE.pts===p?' on':''),p===7?p+'\n×2':String(p),()=>setState({pts:p}));
        pgrid.appendChild(b);
      });
      card.appendChild(pgrid);
    }

    // Money preview
    if(STATE.winner&&(STATE.winner==='none'||STATE.pts)){
      const rpts=STATE.pts===7?14:(STATE.pts||0);
      const ptVal=rpts*STATE.dpp*(STATE.partner==='alone'?2:1);
      const mbox=div('mbox');
      mbox.appendChild(div('',['MONEY PREVIEW'],{color:'#4ade80',fontSize:'10px',letterSpacing:'2px',marginBottom:'6px'}));
      if(STATE.winner==='none'){mbox.appendChild(div('',['No blood.'],{color:'#555'}));}
      else if(STATE.partner==='alone'){
        mbox.appendChild(div('',[rpts+' pts × $'+STATE.dpp+' × 2 = $'+ptVal+'/player'],{color:'#e4ede4'}));
        mbox.appendChild(div('',[captName+(STATE.winner==='captain'?' collects':' pays')+' $'+(ptVal*4)],{color:STATE.winner==='captain'?'#4ade80':'#f87171',marginTop:'4px',fontWeight:'700'}));
      } else if(captTeam.length===3){
        mbox.appendChild(div('',['Winners: each +$'+ptVal],{color:'#4ade80'}));
        mbox.appendChild(div('',['Losers split -$'+(ptVal*3)],{color:'#f87171',marginTop:'4px'}));
      } else {
        mbox.appendChild(div('',['Losers: each -$'+ptVal],{color:'#f87171'}));
        mbox.appendChild(div('',['Winners split +$'+(ptVal*3)],{color:'#4ade80',marginTop:'4px'}));
      }
      if(STATE.pts===7)mbox.appendChild(div('',['🔥 7 pts → 14'],{color:'#f59e0b',fontSize:'11px',marginTop:'6px'}));
      card.appendChild(mbox);
    }

    const ok=STATE.winner==='none'||STATE.pts;
    card.appendChild(btn('btn',hNum<18?'Confirm → Hole '+(hNum+1):'Finish Round',()=>{if(ok)finalizeHole()},{opacity:ok?'1':'0.4'}));
    card.appendChild(btn('btnd','← Change Teams',()=>setState({step:'captain'})));
  }

  wrap.appendChild(card);

  // Edit closed holes
  if(STATE.holes.length>0&&STATE.isKeeper){
    const ec=div('card',null,{marginTop:'0'});
    ec.appendChild(div('sec',['Edit Closed Holes']));
    STATE.holes.forEach((h,hIdx)=>{
      if(STATE.editHole===hIdx){
        ec.appendChild(renderEditForm(h,hIdx,orderPlayers));
      } else {
        const row=div('',null,{display:'flex',justifyContent:'space-between',alignItems:'center',background:'#080d08',borderRadius:'8px',padding:'8px 12px',marginBottom:'6px'});
        const captN=orderPlayers[h.captOI]?.name||'?';
        const partN=h.partner==='alone'?' 🦅':h.partOI!==null?' +'+(orderPlayers[h.partOI]?.name||'?'):'';
        row.appendChild(div('',null,{flex:'1'}).appendChild(div('',['H'+h.hole+' '+captN+partN+' — '+(h.winner==='none'?'No blood':(h.winner==='captain'?'Capt':'Field')+' '+h.pts+'pts')],{fontSize:'12px',color:h.winner==='none'?'#444':h.winner==='captain'?'#4ade80':'#f87171'})) || div(''));
        // rebuild properly
        const info=div('',null,{flex:'1'});
        info.appendChild(div('',['H'+h.hole],{fontSize:'13px',color:'#4ade80',fontWeight:'700',display:'inline',marginRight:'8px'}));
        info.appendChild(div('',[captN+partN],{fontSize:'12px',color:'#777',display:'inline',marginRight:'8px'}));
        info.appendChild(div('',[h.winner==='none'?'No blood':(h.winner==='captain'?'Capt':'Field')+' '+h.pts+'pts'],{fontSize:'12px',color:h.winner==='none'?'#444':h.winner==='captain'?'#4ade80':'#f87171',display:'inline'}));
        const row2=div('',null,{display:'flex',justifyContent:'space-between',alignItems:'center',background:'#080d08',borderRadius:'8px',padding:'8px 12px',marginBottom:'6px'});
        row2.appendChild(info);
        row2.appendChild(btn('btng','Edit',()=>setState({editHole:hIdx}),{fontSize:'11px',padding:'4px 10px'}));
        ec.appendChild(row2);
      }
    });
    wrap.appendChild(ec);
  }
  return wrap;
}

function renderEditForm(h,hIdx,orderPlayers){
  let ew=STATE.winner,ep=h.pts===14?7:h.pts;
  const captTeam=h.partner==='alone'?[h.captOI]:[h.captOI,h.partOI];
  const field=[0,1,2,3,4].filter(i=>!captTeam.includes(i));
  const wrap=div('',null,{background:'#0a1a0a',border:'1px solid #4ade80',borderRadius:'8px',padding:'12px',marginBottom:'8px'});
  wrap.appendChild(div('',['Editing Hole '+h.hole],{fontSize:'13px',color:'#4ade80',fontWeight:'700',marginBottom:'10px'}));

  const wrow=div('row');
  [{k:'captain',l:"Captain's"},{k:'field',l:'Field'},{k:'none',l:'No Blood'}].forEach(({k,l})=>{
    const b=btn('winbtn'+(ew===k?' on':''),l,()=>{ew=k;if(k==='none')ep=null;refreshEdit();},{flex:k==='none'?'0.7':'1'});
    wrow.appendChild(b);
  });
  wrap.appendChild(wrow);

  const pgrid=div('',null,{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:'4px',marginBottom:'10px'});
  [1,2,3,4,5,6,7].forEach(p=>{
    pgrid.appendChild(btn('ptbtn'+(ep===p?' on':''),p===7?p+'\n×2':String(p),()=>{ep=p;refreshEdit();}));
  });
  wrap.appendChild(pgrid);

  function refreshEdit(){
    // update button classes
    wrow.querySelectorAll('button').forEach((b,i)=>{
      const k=['captain','field','none'][i];
      b.className='winbtn'+(ew===k?' on':'');
    });
    pgrid.querySelectorAll('button').forEach((b,i)=>{
      const p=i+1;b.className='ptbtn'+(ep===p?' on':'');
    });
  }

  const brow=div('row');
  brow.appendChild(btn('btn','Save & Recalculate',()=>{if(ew==='none'||ep)saveEdit(hIdx,{winner:ew,pts:ep===7?14:ep});},{flex:'2',opacity:(ew==='none'||ep)?'1':'0.4'}));
  brow.appendChild(btn('btnd','Cancel',()=>setState({editHole:null}),{flex:'1',marginTop:'0'}));
  wrap.appendChild(brow);
  return wrap;
}

    const bot=div('',null,{display:'flex',alignItems:'center',justifyContent:'space-between'});

    const PAY_COLORS={venmo:'#3D95CE',cashapp:'#00D632',paypal:'#003087'};

  wrap.appendChild(hlog);
  wrap.appendChild(btn('btn','← Home',()=>setState({screen:'home'}),{margin:'0 12px 80px'}));
  wrap.appendChild(renderNavBar('summary'));
  return wrap;
}

function renderNavBar(active){
  const nb=div('navbar');
  [['home','🏠','Home'],['newround','⛳','Round'],['history','📋','History'],['stats','📊','Stats'],['roster','👤','Roster']].forEach(([s,icon,lbl])=>{
    const b=document.createElement('button');
    b.className='nb'+(active===s?' on':'');
    b.innerHTML='<div style="font-size:16px">'+icon+'</div>'+lbl;
    b.onclick=()=>setState({screen:s});
    nb.appendChild(b);
  });
  return nb;
}

function render(){

  app.innerHTML='';

  // Always show header
  const hdr=div('hdr');
  hdr.appendChild(div('logo',['5-MAN']));
  hdr.appendChild(div('sub',['CAPTAIN AT THE CREEK']));

  const s=STATE.screen;

  if(s==='login'){app.appendChild(hdr);app.appendChild(renderLogin());return;}
  if(s==='home'){app.appendChild(renderHome());return;}
  if(s==='roster'){app.appendChild(hdr);app.appendChild(renderRoster());return;}
  if(s==='stats'){app.appendChild(renderStats());return;}
  if(s==='history'){app.appendChild(renderHistory());return;}
  if(s==='newround'){app.appendChild(hdr);app.appendChild(renderNewRound());return;}
  if(s==='game'){app.appendChild(renderGame());return;}
  if(s==='spectate'){app.appendChild(renderSpectate());return;}
  if(s==='summary'){app.appendChild(renderSummary());return;}
  app.appendChild(hdr);
  app.appendChild(div('card',['Loading...']));
}

// ── Boot ──────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded',()=>{
  // Check for saved session
  const saved=localStorage.getItem('5mc_user');
  if(saved){
    try{
      STATE.user=JSON.parse(saved);
      STATE.screen='home';
      listenPlayers();
    }catch{STATE.screen='login';}
  }
  render();
  // Load history in background
  loadHistory();
});
</script>
