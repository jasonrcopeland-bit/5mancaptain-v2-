// ── Helpers ───────────────────────────────────────────────────────────────────
function fmt$(n) {
  if (!n) return "$0";
  const r = Math.round(n);
  return (r < 0 ? "-$" : "+$") + Math.abs(r);
}

function calcCourseHdcp(index, slope, rating, par) {
  return Math.round(parseFloat(index||0) * (parseFloat(slope||113)/113) + (parseFloat(rating||72) - parseFloat(par||72)));
}

function strokeHolesForPlayer(extra, holeHdcps) {
  if (extra <= 0) return [];
  return [...(holeHdcps||[])].map((h,i) => ({hole:i+1, hdcp:parseInt(h)||i+1}))
    .sort((a,b) => a.hdcp-b.hdcp).slice(0,extra).map(h => h.hole);
}

function computeHdcp(cd, players) {
  const par = parseInt(cd.par)||72, slope = parseFloat(cd.slope)||113, rating = parseFloat(cd.rating)||par;
  const courseHdcps = players.map(p => calcCourseHdcp(p.index||p.lastIndex||0, slope, rating, par));
  const low = Math.min(...courseHdcps);
  const extras = courseHdcps.map(ch => Math.max(0, ch-low));
  const sHoles = extras.map(e => strokeHolesForPlayer(e, cd.holeHdcps||[]));
  return {courseHdcps, low, extras, sHoles};
}

function whoIsFurtherBehind(pis, ledger, hdcps) {
  const [a,b] = pis;
  if (ledger[a] !== ledger[b]) return ledger[a] < ledger[b] ? [a,b] : [b,a];
  return (hdcps?.[a]||0) >= (hdcps?.[b]||0) ? [a,b] : [b,a];
}

function applyHoleMoney(h, ledger, dpp, hdcps) {
  const realPts = h.pts===7?14:(h.pts||0);
  if (!h.winner||h.winner==="none"||!realPts) return [...ledger];
  const nl = [...ledger];
  const isLone = h.partner==="alone";
  const ptVal = realPts * dpp * (isLone?2:1);
  const captOI = isLone ? [h.captainOI] : [h.captainOI, h.partnerOI];
  const fieldOI = [0,1,2,3,4].filter(i => !captOI.includes(i));
  const winOI = h.winner==="captain" ? captOI : fieldOI;
  const loseOI = h.winner==="captain" ? fieldOI : captOI;
  
  if (winOI.length===1 && loseOI.length===4) {
    loseOI.forEach(i=>{nl[i]-=ptVal;}); nl[winOI[0]]+=ptVal*4;
  } else if (winOI.length===4 && loseOI.length===1) {
    nl[loseOI[0]]-=ptVal*4; winOI.forEach(i=>{nl[i]+=ptVal;});
  } else if (winOI.length===3 && loseOI.length===2) {
    winOI.forEach(i=>{nl[i]+=ptVal;});
    const total=ptVal*3, cents=Math.round(total*100), hi=Math.ceil(cents/200), lo=Math.floor(cents/200);
    const [f,o] = whoIsFurtherBehind(loseOI, nl, hdcps);
    nl[f]-=lo; nl[o]-=hi;
  } else if (winOI.length===2 && loseOI.length===3) {
    loseOI.forEach(i=>{nl[i]-=ptVal;});
    const total=ptVal*3, cents=Math.round(total*100), hi=Math.ceil(cents/200), lo=Math.floor(cents/200);
    const [f,o] = whoIsFurtherBehind(winOI, nl, hdcps);
    nl[f]+=hi; nl[o]+=lo;
  }
  nl.forEach((v,i)=>{nl[i]=Math.round(v);});
  return nl;
}

function getLightningHoles(setting) {
  return setting==="14" ? [13,16,17] : [15,16,17];
}

function captainFor(holeIdx, ledger, passed, lightningRound) {
  const lh = getLightningHoles(lightningRound||"16");
  if (lightningRound==="14") {
    if (holeIdx===14) return 3;
    if (holeIdx===15) return 4;
  }
  if (lh.includes(holeIdx)) {
    const eligible = [0,1,2,3,4].filter(i=>!passed.includes(i));
    if (!eligible.length) return holeIdx%5;
    return [...eligible].sort((a,b)=>ledger[a]-ledger[b])[0];
  }
  return holeIdx%5;
}

function computeSettlement(orderPlayers, ledger, playerOrder, allPlayers) {
  const balances = orderPlayers.map((p,i) => {
    const rp = allPlayers.find(r => r.id === playerOrder?.[i]);
    return { name:p.name, oi:i, bal:Math.round(ledger[i]||0), paymentMethod:rp?.paymentMethod||"cash", paymentHandle:rp?.paymentHandle||"" };
  });
  const cred = balances.filter(p=>p.bal>0).sort((a,b)=>b.bal-a.bal).map(p=>({...p,rem:p.bal}));
  const debt = balances.filter(p=>p.bal<0).sort((a,b)=>a.bal-b.bal).map(p=>({...p,rem:Math.abs(p.bal)}));
  const txns = [];
  let ci=0, di=0;
  while(ci<cred.length && di<debt.length) {
    const amt = Math.min(cred[ci].rem, debt[di].rem);
    if(amt>0) txns.push({from:debt[di], to:cred[ci], amount:amt});
    cred[ci].rem-=amt; debt[di].rem-=amt;
    if(cred[ci].rem===0) ci++;
    if(debt[di].rem===0) di++;
  }
  return txns;
}

// ── Firebase ops ──────────────────────────────────────────────────────────────
async function pinSignIn(playerId, pin) {
  const snap = await db.collection("players").doc(playerId).get();
  if (!snap.exists) return {error:"Player not found"};
  const data = snap.data();
  if (!data.pin) return {error:"No PIN set — re-register"};
  if (data.pin !== pin) return {error:"Wrong PIN"};
  return {user:{uid:playerId, name:data.name}};
}

async function pinRegister(name, pin) {
  const snap = await db.collection("players").where("name","==",name).limit(1).get();
  if (!snap.empty) {
    const id = snap.docs[0].id;
    await db.collection("players").doc(id).update({pin});
    return {user:{uid:id, name}};
  }
  const ref = await db.collection("players").add({name, pin, rounds:0, wins:0, totalMoney:0, totalHoles:0, captainHoles:0, captainMoney:0});
  return {user:{uid:ref.id, name}};
}

async function loadPlayers() {
  const snap = await db.collection("players").orderBy("name").get();
  return snap.docs.map(d=>({id:d.id,...d.data()}));
}

async function savePlayer(player) {
  const {id,...data} = player;
  if (id) { await db.collection("players").doc(id).set(data,{merge:true}); return id; }
  const ref = await db.collection("players").add(data); return ref.id;
}

async function createRound(data) {
  const words = ["CREEK","EAGLE","BIRDIE","BOGEY","FAIRWAY","GREEN","FLAG"];
  const code = words[Math.floor(Math.random()*words.length)] + "-" + (Math.floor(Math.random()*90)+10);
  const ref = await db.collection("rounds").add({...data, gameCode:code, status:"active", holes:[], createdAt:firebase.firestore.FieldValue.serverTimestamp()});
  return {id:ref.id, gameCode:code};
}

async function updateRound(id, data) {
  await db.collection("rounds").doc(id).update(data);
}

async function loadHistory() {
  const snap = await db.collection("rounds").where("status","==","complete").orderBy("completedAt","desc").limit(20).get();
  return snap.docs.map(d=>({id:d.id,...d.data()}));
}

function loadSession() {

}
function saveSession(u) { localStorage.setItem("5mc_user", JSON.stringify(u)); }
function clearSession() { localStorage.removeItem("5mc_user"); }

// ── Render ────────────────────────────────────────────────────────────────────
function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  if (attrs) {
    Object.entries(attrs).forEach(([k,v]) => {
      if (k === "className") el.className = v;
      else if (k === "style") Object.assign(el.style, v);
      else if (k.startsWith("on")) el.addEventListener(k.slice(2).toLowerCase(), v);
      else if (k === "placeholder") el.placeholder = v;
      else if (k === "type") el.type = v;
      else if (k === "value") { el.value = v; }
      else if (k === "maxLength") el.maxLength = v;
      else if (k === "inputMode") el.inputMode = v;
      else if (k === "disabled") el.disabled = v;
      else if (k === "href") el.href = v;
      else if (k === "target") el.target = v;
      else el.setAttribute(k, v);
    });
  }
  children.flat(Infinity).forEach(c => {
    if (c === null || c === undefined || c === false) return;
    el.appendChild(typeof c === "string" || typeof c === "number" ? document.createTextNode(c) : c);
  });
  return el;
}

function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";
  let screen;
  try {
    screen = buildScreen();
  } catch(e) {
    screen = buildError(e.message);
  }
  app.appendChild(screen);
}

function buildError(msg) {
  const d = h("div", {className:"card"}, h("div",{className:"err"},"Error: "+msg), h("button",{className:"btn",onClick:()=>setState({screen:"login",user:null})},"← Back to Login"));
  return h("div",{}, h("div",{className:"hdr"},h("div",{className:"logo"},"5-MAN"),h("div",{className:"sub"},"ERROR")), d);
}

function buildScreen() {
  const {screen, user} = state;
  if (!user || screen === "login") return buildLogin();
  if (screen === "home") return buildHome();
  if (screen === "roster") return buildRoster();
  if (screen === "newround") return buildNewRound();
  if (screen === "game") return buildGame();
  if (screen === "summary") return buildSummary();
  if (screen === "history") return buildHistory();
  if (screen === "stats") return buildStats();
  if (screen === "midround-history") return buildMidroundHistory();
  if (screen === "edithole") return buildEditHole();
  return buildHome();
}

function buildEditHole() {
  const hIdx = state.editingHole;
  const h2 = state.holes[hIdx];
  if (!h2) { setState({screen:"game"}); return h("div",{}); }
  const orderPlayers = (state.round?.playerOrder||[]).map(id => state.players.find(p=>p.id===id)||{name:"?"});
  const captTeamOI = h2.partner==="alone" ? [h2.captainOI] : [h2.captainOI, h2.partnerOI].filter(x=>x!==null&&x!==undefined);
  const fieldOI = [0,1,2,3,4].filter(i=>!captTeamOI.includes(i));

  let editWinner = state.editWinner !== undefined ? state.editWinner : h2.winner;
  let editPts = state.editPts !== undefined ? state.editPts : (h2.pts===14?7:h2.pts);

  const wrap = h("div",{},h("div",{className:"hdr"},h("div",{className:"logo"},"EDIT"),h("div",{className:"sub"},"HOLE "+h2.hole)));
  const card = h("div",{className:"card"});
  card.appendChild(h("div",{className:"sec"},"Capt: "+(orderPlayers[h2.captainOI]?.name||"?")+(h2.partner==="alone"?" 🦅 Lone":h2.partnerOI!==null?" + "+(orderPlayers[h2.partnerOI]?.name||"?"):"")));
  card.appendChild(h("div",{style:{display:"flex",gap:8,marginBottom:14}},
    h("div",{style:{flex:1,background:"#080d08",borderRadius:8,padding:"10px 12px"}},h("div",{style:{fontSize:9,letterSpacing:2,color:"#4ade80",marginBottom:4}},"CAPT'S TEAM"),...captTeamOI.map(oi=>h("div",{style:{fontSize:13}},orderPlayers[oi]?.name||"?"))),
    h("div",{style:{flex:1,background:"#080d08",borderRadius:8,padding:"10px 12px"}},h("div",{style:{fontSize:9,letterSpacing:2,color:"#888",marginBottom:4}},"FIELD"),...fieldOI.map(oi=>h("div",{style:{fontSize:13,color:"#aaa"}},orderPlayers[oi]?.name||"?")))
  ));

  card.appendChild(h("div",{className:"sec"},"Who Won?"));
  const winRow = h("div",{style:{display:"flex",gap:6,marginBottom:10}});
  [{k:"captain",lbl:"Captain's Team"},{k:"field",lbl:"Field"},{k:"none",lbl:"No Blood"}].forEach(({k,lbl}) => {
    const wb = h("button",{style:{flex:k==="none"?0.7:1,background:editWinner===k?"#162616":"#0a130a",border:editWinner===k?"2px solid #4ade80":"1px solid #1e3a1e",borderRadius:8,color:editWinner===k?"#e4ede4":"#bbb",padding:"12px 6px",fontSize:12,cursor:"pointer",fontFamily:"Georgia,serif",textAlign:"center"}},lbl);
    wb.onclick = () => { state.editWinner=k; if(k==="none") state.editPts=null; render(); };
    winRow.appendChild(wb);
  });
  card.appendChild(winRow);

  if (editWinner && editWinner !== "none") {
    card.appendChild(h("div",{className:"sec"},"Points"));
    const ptGrid = h("div",{style:{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:5,marginBottom:12}});
    [1,2,3,4,5,6,7].forEach(p => {
      const pb = h("button",{style:{background:editPts===p?"#162616":"#0a130a",border:editPts===p?"2px solid #4ade80":"1px solid #1e3a1e",borderRadius:8,color:editPts===p?"#e4ede4":"#bbb",padding:"12px 4px",fontSize:18,cursor:"pointer",fontFamily:"Georgia,serif",textAlign:"center"}},p+(p===7?" ×2":""));
      pb.onclick = () => { state.editPts=p; render(); };
      ptGrid.appendChild(pb);
    });
    card.appendChild(ptGrid);
  }

  const saveBtn = h("button",{className:"btn",style:{opacity:(editWinner==="none"||editPts)?1:0.4}},"Save & Recalculate");
  saveBtn.onclick = async () => {
    if (!editWinner||(editWinner!=="none"&&!editPts)) return;
    const realPts = editPts===7?14:(editPts||0);
    const newHoles = [...state.holes];
    newHoles[hIdx] = {...newHoles[hIdx], winner:editWinner, pts:realPts};
    // Replay ledger from this hole
    const hdcps = state.hdcpInfo?.courseHdcps;
    let runLedger = hIdx===0 ? [0,0,0,0,0] : [...(newHoles[hIdx-1].ledgerAfter||[0,0,0,0,0])];
    for(let i=hIdx; i<newHoles.length; i++) {
      runLedger = applyHoleMoney(newHoles[i], runLedger, newHoles[i].dpp||state.activeDpp, hdcps);
      newHoles[i] = {...newHoles[i], ledgerAfter:[...runLedger]};
    }
    await updateRound(state.roundId, {holes:newHoles, ledger:runLedger});
    state.editWinner = undefined; state.editPts = undefined;
    setState({holes:newHoles, ledger:runLedger, screen:"midround-history", editingHole:null});
  };
  const cancelBtn = h("button",{className:"btn-dark"},"← Cancel");
  cancelBtn.onclick = () => { state.editWinner=undefined; state.editPts=undefined; setState({screen:"midround-history"}); };
  card.appendChild(saveBtn); card.appendChild(cancelBtn);
  wrap.appendChild(card);
  return wrap;
}

function buildMidroundHistory() {
  const {round, holes, ledger} = state;
  const orderPlayers = (round?.playerOrder||[]).map(id => state.players.find(p=>p.id===id)||{name:"?"});
  const wrap = h("div",{},h("div",{className:"hdr"},h("div",{className:"logo"},"HOLE LOG"),h("div",{className:"sub"},(round?.gameCode||"")+" · "+(round?.courseData?.name||""))));

  // Current ledger
  const ledgerDiv = h("div",{style:{display:"flex",background:"#0a130a",borderBottom:"1px solid #1a3a1a"}});
  orderPlayers.forEach((p,oi) => {
    const item = h("div",{style:{flex:1,padding:"7px 3px",textAlign:"center",borderRight:"1px solid #1a3a1a"}});
    item.appendChild(h("div",{style:{fontSize:10,color:"#555"}},p.name?.split(" ")[0]||"?"));
    item.appendChild(h("div",{style:{fontSize:13,fontWeight:700,color:ledger[oi]>=0?"#4ade80":"#f87171"}},fmt$(ledger[oi])));
    ledgerDiv.appendChild(item);
  });
  wrap.appendChild(ledgerDiv);

  const card = h("div",{className:"card"},h("div",{className:"sec"},"Completed Holes"));
  if (!holes.length) card.appendChild(h("div",{style:{color:"#555",padding:12}},"No holes completed yet."));
  holes.forEach((h2,hIdx) => {
    const row = h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:"1px solid #1a3a1a",padding:"8px 0"}});
    const info = h("div",{});
    info.appendChild(h("div",{style:{display:"flex",gap:12,alignItems:"center"}},
      h("span",{style:{color:"#4ade80",fontWeight:700,fontSize:14}},"H"+h2.hole),
      h("span",{style:{fontSize:12,color:"#777"}},(orderPlayers[h2.captainOI]?.name||"?")+(h2.partner==="alone"?" 🦅":h2.partnerOI!==null?" +"+(orderPlayers[h2.partnerOI]?.name||"?"):"")),
      h("span",{style:{fontSize:13,color:h2.winner==="none"?"#444":h2.winner==="captain"?"#4ade80":"#f87171"}},h2.winner==="none"?"No blood":(h2.winner==="captain"?"Capt":"Field")+" "+h2.pts+"pts")
    ));
    const editBtn = h("button",{className:"btn-ghost",style:{fontSize:11,padding:"4px 10px"}},"Edit");
    editBtn.onclick = () => setState({editingHole:hIdx, screen:"edithole"});
    row.appendChild(info); row.appendChild(editBtn);
    card.appendChild(row);
  });

  const backBtn = h("button",{className:"btn-dark"},"← Back to Game");
  backBtn.onclick = () => setState({screen:"game"});
  card.appendChild(backBtn);
  wrap.appendChild(card);
  wrap.appendChild(buildNav("history"));
  return wrap;
}

function buildLogin() {

// ── Nav ───────────────────────────────────────────────────────────────────────
function buildNav(active) {
  const tabs = [["home","🏠","Home"],["newround","⛳","Round"],["history","📋","History"],["stats","📊","Stats"],["roster","👤","Roster"]];
  const nav = h("div",{className:"nav"});
  tabs.forEach(([s,icon,lbl]) => {
    const btn = h("button",{className:active===s?"active":""},h("div",{style:{fontSize:16}},icon),lbl);
    btn.onclick = () => {
      if (s === "history") {
        // Show hole history if mid-round, otherwise load full history
        if (state.round && state.screen === "game") {
          setState({screen:"midround-history"});
        } else {
          loadHistory().then(rounds => setState({screen:"history", history:rounds}));
        }
      } else if (s === "newround") {
        if (state.round && state.round.status === "active") {
          // Round in progress — go to game screen
          setState({screen:"game"});
        } else {
          // No active round — start setup fresh
          state.setupPlayers = [null,null,null,null,null];
          state.setupDpp = "";
          state.setupPressMode = "";
          state.setupLightning = "";
          setState({screen:"newround", setupStep:"players"});
        }
      } else if (s === "home") {
        setState({screen:"home"});
      } else {
        setState({screen:s});
      }
    };
    nav.appendChild(btn);
  });
  return nav;
}

// ── Hardcoded default course ──────────────────────────────────────────────────
const CRESS_CREEK = {
  id: "cress-creek",
  name: "Cress Creek Country Club",
  tee: "Blue",
  rating: "71.9",
  slope: "132",
  par: "72",
  holeHdcps: ["5","13","9","1","17","11","15","7","3","12","14","6","2","18","8","4","16","10"],
  holePars: ["4","4","4","4","3","4","4","3","4","4","3","4","5","3","4","4","3","5"],
  isDefault: true
};

function loadSavedCourses() {
  try { return JSON.parse(localStorage.getItem("5mc_courses")||"[]"); } catch { return []; }
}
function saveCourseLocal(course) {
  const courses = loadSavedCourses().filter(c => c.id !== course.id);
  courses.unshift(course);
  localStorage.setItem("5mc_courses", JSON.stringify(courses));
}
function deleteCourseLocal(id) {
  const courses = loadSavedCourses().filter(c => c.id !== id);
  localStorage.setItem("5mc_courses", JSON.stringify(courses));
}

function buildSetupCourse() {
  const savedCourses = loadSavedCourses();
  const courseMode = state.courseMode || "select"; // select | search | manual | edit

  const wrap = h("div",{},h("div",{className:"hdr"},h("div",{className:"logo"},"5-MAN"),h("div",{className:"sub"},"SELECT COURSE")));

  // ── SELECT mode: show Cress Creek + saved courses + options ──
  if (courseMode === "select") {
    const card = h("div",{className:"card"});

    // Cress Creek default
    card.appendChild(h("div",{className:"sec"},"Home Course"));
    const ccBtn = h("div",{className:"player-row",style:{cursor:"pointer"}});
    ccBtn.appendChild(h("div",{style:{flex:1}},
      h("div",{style:{fontSize:15,color:"#c5e8c5"}},"⛳ Cress Creek CC"),
      h("div",{style:{fontSize:11,color:"#666"}},"Blue · Rtg 71.9 / Slp 132")));
    ccBtn.appendChild(h("span",{style:{color:"#4ade80",fontSize:18}},"→"));
    ccBtn.onclick = () => { state.setupCourse = {...CRESS_CREEK}; setState({setupStep:"confirm"}); };
    card.appendChild(ccBtn);

    // Saved courses
    if (savedCourses.length > 0) {
      card.appendChild(h("div",{className:"sec"},"Saved Courses"));
      savedCourses.forEach(c => {
        const row = h("div",{className:"player-row",style:{cursor:"pointer"}});
        row.appendChild(h("div",{style:{flex:1}},
          h("div",{style:{fontSize:14}},c.name),
          h("div",{style:{fontSize:11,color:"#666"}},c.tee+" · Rtg "+c.rating+" / Slp "+c.slope)));
        const editBtn = h("button",{className:"btn-ghost",style:{fontSize:11,padding:"4px 8px",marginRight:6}},"Edit");
        editBtn.onclick = e => { e.stopPropagation(); state.editingCourse = {...c}; state.courseMode = "edit"; render(); };
        const delBtn = h("button",{className:"btn-ghost",style:{fontSize:11,padding:"4px 8px"}},"✕");
        delBtn.onclick = e => { e.stopPropagation(); deleteCourseLocal(c.id); render(); };
        const useBtn = h("span",{style:{color:"#4ade80",fontSize:18,cursor:"pointer"}},"→");
        useBtn.onclick = () => { state.setupCourse = {...c}; setState({setupStep:"confirm"}); };
        row.appendChild(editBtn); row.appendChild(delBtn); row.appendChild(useBtn);
        card.appendChild(row);
      });
    }

    // Search / Manual options
    card.appendChild(h("div",{className:"sec"},"Other Course"));
    const manualBtn = h("button",{className:"btn"},"✏️ Enter Course Manually");
    manualBtn.onclick = () => {
      state.courseMode = "manual";
      state.setupCourseName = ""; state.setupTee = "White"; state.setupRating = ""; state.setupSlope = ""; state.setupPar = "72";
      state.setupHoleHdcps = Array(18).fill("");
      render();
    };
    const backBtn = h("button",{className:"btn-dark"},"← Back");
    backBtn.onclick = () => setState({setupStep:"players"});
    card.appendChild(manualBtn); card.appendChild(backBtn);
    wrap.appendChild(card);
    return wrap;
  }

  // ── SEARCH mode ──
  if (courseMode === "search") {
    const card = h("div",{className:"card"},h("div",{className:"sec"},"Search Course"));
    const sRow = h("div",{className:"row"});
    const sInp = h("input",{type:"text",placeholder:"Course name…",style:{flex:1,marginBottom:0}});
    sInp.value = state.courseSearchQuery||"";
    sInp.addEventListener("input", e => { state.courseSearchQuery = e.target.value; });
    const sBtn = h("button",{className:"btn-ghost",style:{whiteSpace:"nowrap"}},state.courseSearching?"…":"Search");
    sBtn.onclick = async () => {
      const q = state.courseSearchQuery;
      if (!q) return;
      state.courseSearching = true; state.courseSearchResults = []; state.courseSearchErr = ""; render();
      try {
        const r = await fetch("https://api.golfcourseapi.com/v1/courses?name="+encodeURIComponent(q), {headers:{Authorization:"Key KXSGCSOLULGUKSCRQHLBHTCAME"}});
        const d = await r.json();
        const list = d.courses||d.data||(Array.isArray(d)?d:[]);
        state.courseSearchResults = list.slice(0,8);
        if (!list.length) state.courseSearchErr = "No results — try manual entry.";
      } catch(e) { state.courseSearchErr = "Search failed — try manual entry."; }
      state.courseSearching = false; render();
    };
    sRow.appendChild(sInp); sRow.appendChild(sBtn);
    card.appendChild(sRow);
    if (state.courseSearchErr) card.appendChild(h("div",{className:"err"},state.courseSearchErr));
    (state.courseSearchResults||[]).forEach(c => {
      const row = h("div",{className:"player-row",style:{cursor:"pointer"}});
      row.appendChild(h("div",{style:{flex:1}},h("div",{style:{fontSize:14}},c.club_name||c.name),h("div",{style:{fontSize:11,color:"#666"}},(c.city||"")+", "+(c.state||""))));
      row.onclick = async () => {
        state.courseSearching = true; render();
        try {
          const r = await fetch("https://api.golfcourseapi.com/v1/courses/"+(c.id||c.course_id), {headers:{Authorization:"Key KXSGCSOLULGUKSCRQHLBHTCAME"}});
          const d = await r.json();
          const course = d.course||d;
          state.apiTees = course.tees||course.tee_boxes||[];
          state.selectedApiClub = c;
          state.courseMode = "tees";
        } catch { state.courseSearchErr = "Could not load course data."; }
        state.courseSearching = false; render();
      };
      card.appendChild(row);
    });
    const backBtn = h("button",{className:"btn-dark"},"← Back");
    backBtn.onclick = () => { state.courseMode = "select"; render(); };
    card.appendChild(backBtn);
    wrap.appendChild(card);
    return wrap;
  }

  // ── TEES mode (after API search) ──
  if (courseMode === "tees") {
    const card = h("div",{className:"card"},h("div",{className:"sec"},"Select Tees — "+(state.selectedApiClub?.club_name||"")));
    (state.apiTees||[]).forEach(t => {
      const row = h("div",{className:"player-row",style:{cursor:"pointer",border:state.setupCourse?.tee===t.tee_name?"1px solid #4ade80":"1px solid #1a3a1a"}});
      row.appendChild(h("div",{style:{flex:1}},h("div",{style:{fontSize:14}},t.tee_name),h("div",{style:{fontSize:11,color:"#666"}},"Rtg "+t.course_rating+" / Slp "+t.slope_rating)));
      row.onclick = () => {
        const holes = t.holes||[];

        const holePars = holes.map(hh => String(hh.par||"4"));
        const par = holePars.reduce((s,p)=>s+(parseInt(p)||4),0);
        const cd = {id: Date.now().toString(), name:state.selectedApiClub.club_name||state.selectedApiClub.name, tee:t.tee_name, rating:String(t.course_rating||""), slope:String(t.slope_rating||""), par:String(par), holeHdcps, holePars};
        saveCourseLocal(cd);
        state.setupCourse = cd;
        setState({setupStep:"confirm"});
      };
      card.appendChild(row);
    });
    if (!(state.apiTees||[]).length) card.appendChild(h("div",{style:{color:"#666",fontSize:13}},"No tee data — try manual entry."));
    const backBtn = h("button",{className:"btn-dark"},"← Back");
    backBtn.onclick = () => { state.courseMode = "search"; render(); };
    card.appendChild(backBtn);
    wrap.appendChild(card);
    return wrap;
  }

  // ── MANUAL / EDIT mode ──
  if (courseMode === "manual" || courseMode === "edit") {
    const isEdit = courseMode === "edit";
    const ec = isEdit ? state.editingCourse : null;
    if (isEdit && ec) {
      state.setupCourseName = ec.name;
      state.setupTee = ec.tee;
      state.setupRating = ec.rating;
      state.setupSlope = ec.slope;
      state.setupPar = ec.par;
      state.setupHoleHdcps = [...(ec.holeHdcps||Array(18).fill(""))];
      state.courseMode = "editing"; // prevent re-init loop
    }
    if (!state.setupHoleHdcps) state.setupHoleHdcps = Array(18).fill("");
    if (!state.setupTee) state.setupTee = "White";
    if (!state.setupPar) state.setupPar = "72";

    const card = h("div",{className:"card"});
    card.appendChild(h("div",{className:"sec"},isEdit?"Edit Course":"Manual Entry"));
    const nameInp = h("input",{type:"text",placeholder:"Course name"});
    nameInp.value = state.setupCourseName||"";
    nameInp.addEventListener("input", e => { state.setupCourseName = e.target.value; });
    card.appendChild(nameInp);

    card.appendChild(h("div",{className:"sec"},"Tees"));
    const teeRow = h("div",{className:"row"});
    ["Black","Blue","White","Gold","Red"].forEach(t => {
      const isActive = state.setupTee === t;
      const tb = h("button",{style:{flex:1,background:isActive?"#1a5c1a":"#0a130a",border:isActive?"1px solid #4ade80":"1px solid #1e3a1e",borderRadius:8,color:isActive?"#e4ede4":"#888",padding:"8px 4px",fontSize:12,cursor:"pointer",fontFamily:"Georgia,serif"}},t);
      tb.onclick = () => { state.setupTee = t; render(); };
      teeRow.appendChild(tb);
    });
    card.appendChild(teeRow);

    card.appendChild(h("div",{className:"sec"},"Rating / Slope / Par"));
    const rRow = h("div",{className:"row"});
    const ratingInp = h("input",{type:"number",placeholder:"Rating",style:{flex:1,marginBottom:0}});
    ratingInp.value = state.setupRating||"";
    ratingInp.addEventListener("input", e => { state.setupRating = e.target.value; });
    const slopeInp = h("input",{type:"number",placeholder:"Slope",style:{flex:1,marginBottom:0}});
    slopeInp.value = state.setupSlope||"";
    slopeInp.addEventListener("input", e => { state.setupSlope = e.target.value; });
    const parInp = h("input",{type:"number",placeholder:"Par",style:{flex:1,marginBottom:0}});
    parInp.value = state.setupPar||"72";
    parInp.addEventListener("input", e => { state.setupPar = e.target.value; });
    rRow.appendChild(ratingInp); rRow.appendChild(slopeInp); rRow.appendChild(parInp);
    card.appendChild(rRow);

    card.appendChild(h("div",{className:"sec"},"Hole Handicap Ratings"));
    const hdcpGrid = h("div",{style:{display:"grid",gridTemplateColumns:"repeat(9,1fr)",gap:3}});
    for(let i=0;i<18;i++) {
      const cell = h("div",{style:{background:"#080d08",border:"1px solid #1a3a1a",borderRadius:5,padding:"3px 2px",textAlign:"center"}});
      cell.appendChild(h("div",{style:{fontSize:9,color:"#4ade80"}},"H"+(i+1)));
      const inp = h("input",{type:"number",style:{width:"100%",background:"transparent",border:"none",borderTop:"1px solid #1a3a1a",color:"#e4ede4",padding:"3px 0",fontSize:11,textAlign:"center",outline:"none",fontFamily:"Georgia,serif",marginTop:2}});
      inp.value = state.setupHoleHdcps[i]||"";
      const idx = i;
      inp.addEventListener("input", e => { state.setupHoleHdcps[idx] = e.target.value; });
      cell.appendChild(inp);
      hdcpGrid.appendChild(cell);
    }
    card.appendChild(hdcpGrid);

    const saveBtn = h("button",{className:"btn"},isEdit?"Save Changes →":"Save & Continue →");
    saveBtn.onclick = () => {
      const cd = {
        id: isEdit ? ec.id : Date.now().toString(),
        name: state.setupCourseName||"",
        tee: state.setupTee||"White",
        rating: state.setupRating||"72",
        slope: state.setupSlope||"113",
        par: state.setupPar||"72",
        holeHdcps: [...state.setupHoleHdcps],
        holePars: Array(18).fill("4")
      };
      saveCourseLocal(cd);
      state.setupCourse = cd;
      state.courseMode = "select";
      setState({setupStep:"confirm"});
    };
    const backBtn = h("button",{className:"btn-dark"},"← Back");
    backBtn.onclick = () => { state.courseMode = "select"; render(); };
    card.appendChild(saveBtn); card.appendChild(backBtn);
    wrap.appendChild(card);
    return wrap;
  }

  // Fallback
  state.courseMode = "select";
  render();
  return h("div",{});
}

function buildSetupConfirm() {
  const {setupPlayers, setupCourse, setupDpp, setupPressMode, setupLightning} = state;
  const hdcp = setupCourse ? computeHdcp(setupCourse, setupPlayers) : null;
  const wrap = h("div",{},h("div",{className:"hdr"},h("div",{className:"logo"},"5-MAN"),h("div",{className:"sub"},"CONFIRM ROUND")));
  const card = h("div",{className:"card"});
  
  // Course handicaps
  card.appendChild(h("div",{className:"sec"},"Course Handicaps — "+(setupCourse?.name||"")+" ("+(setupCourse?.tee||"")+")"));
  card.appendChild(h("div",{style:{fontSize:11,color:"#555",marginBottom:10}},"Low hdcp: "+(hdcp?.low||0)+" — all others play relative to this."));
  setupPlayers.forEach((p,i) => {
    const row = h("div",{className:"player-row",style:{cursor:"default"}});
    row.appendChild(h("span",{style:{flex:1,fontSize:15}},(i+1)+". "+p.name));
    const hdcpSpan = h("div",{style:{textAlign:"right"}},h("span",{style:{fontSize:15,color:"#4ade80",fontWeight:700}},"Hdcp "+(hdcp?.courseHdcps[i]||0)));
    if(hdcp?.extras[i]>0) hdcpSpan.appendChild(h("div",{style:{fontSize:11,color:"#f59e0b"}},"+"+hdcp.extras[i]+" stroke"+(hdcp.extras[i]>1?"s":"")));
    row.appendChild(hdcpSpan);
    card.appendChild(row);
  });

  // Reorder section
  card.appendChild(h("div",{className:"sec"},"Adjust Tee Order (tap ↑↓ to move)"));
  card.appendChild(h("div",{style:{fontSize:11,color:"#888",marginBottom:8}},"Player 1 is Captain on hole 1."));
  setupPlayers.forEach((p,i) => {
    const row = h("div",{style:{display:"flex",alignItems:"center",background:"#080d08",border:"1px solid #1a3a1a",borderRadius:8,padding:"8px 12px",marginBottom:6,gap:8}});
    row.appendChild(h("span",{style:{color:"#4ade80",fontWeight:700,minWidth:20}},(i+1)));
    row.appendChild(h("span",{style:{flex:1,fontSize:14}},p.name));
    const upBtn = h("button",{className:"btn-ghost",style:{padding:"4px 10px",fontSize:16,opacity:i===0?0.3:1}},"↑");
    upBtn.onclick = () => {
      if(i===0) return;
      const np=[...state.setupPlayers]; [np[i],np[i-1]]=[np[i-1],np[i]];
      setState({setupPlayers:np});
    };
    const downBtn = h("button",{className:"btn-ghost",style:{padding:"4px 10px",fontSize:16,opacity:i===setupPlayers.length-1?0.3:1}},"↓");
    downBtn.onclick = () => {
      if(i===setupPlayers.length-1) return;
      const np=[...state.setupPlayers]; [np[i],np[i+1]]=[np[i+1],np[i]];
      setState({setupPlayers:np});
    };
    row.appendChild(upBtn); row.appendChild(downBtn);
    card.appendChild(row);
  });

  // Round summary
  const summaryDiv = h("div",{style:{background:"#080d08",borderRadius:8,padding:"10px 12px",marginTop:8,marginBottom:8}});
  summaryDiv.appendChild(h("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:4}},h("span",{style:{color:"#888"}},"$/pt"),h("span",{style:{color:"#e4ede4"}},"$"+setupDpp)));
  summaryDiv.appendChild(h("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:4}},h("span",{style:{color:"#888"}},"Press"),h("span",{style:{color:"#e4ede4",textTransform:"capitalize"}},setupPressMode)));
  summaryDiv.appendChild(h("div",{style:{display:"flex",justifyContent:"space-between"}},h("span",{style:{color:"#888"}},"Lightning"),h("span",{style:{color:"#f59e0b"}},"⚡ Holes "+(setupLightning==="14"?"14,17,18":"16,17,18"))));
  card.appendChild(summaryDiv);

  const startBtn = h("button",{className:"btn"},"⛳ Start Round");
  startBtn.onclick = async () => {
    const {id, gameCode} = await createRound({
      playerOrder: setupPlayers.map(p=>p.id),
      players: setupPlayers,
      courseData: setupCourse,
      dpp: parseFloat(setupDpp),
      pressMode: setupPressMode,
      lightningRound: setupLightning,
      activeDpp: parseFloat(setupDpp),
    });
    const hdcpInfo = computeHdcp(setupCourse, setupPlayers);
    // Store full player objects directly in round so they're always available
    const roundState = {
      playerOrder: setupPlayers.map(p=>p.id),
      playerObjects: setupPlayers, // full player data
      courseData: setupCourse,
      dpp: parseFloat(setupDpp),
      pressMode: setupPressMode,
      lightningRound: setupLightning,
      gameCode, id, status:"active"
    };
    setState({
      screen:"game", roundId:id, round:roundState,
      hdcpInfo, activeDpp:parseFloat(setupDpp),
      ledger:[0,0,0,0,0], currentHole:0, holes:[], pressLog:[],
      step:"captain", partner:null, winner:null, pts:null, passed:[], editingHole:null
    });
  };
  const backBtn = h("button",{className:"btn-dark"},"← Back");
  backBtn.onclick = () => setState({setupStep:"course"});
  card.appendChild(startBtn); card.appendChild(backBtn);
  wrap.appendChild(card);
  return wrap;
}

// ── Game ──────────────────────────────────────────────────────────────────────
function buildGame() {
  const {round, holes, ledger, currentHole, activeDpp, passed, step, partner, winner, pts, hdcpInfo, pressLog, editingHole, showPress, pressingPlayer} = state;
  if (!round) return buildHome();
  const holeNum = currentHole+1;
  const orderPlayers = round.playerObjects || (round.playerOrder||[]).map(id => state.players.find(p=>p.id===id)||{name:"?",index:0});
  const curCaptOI = captainFor(currentHole, ledger, passed, round.lightningRound||"16");
  const lh = getLightningHoles(round.lightningRound||"16");
  const isLightning = lh.includes(currentHole);
  const strokesThisHole = hdcpInfo ? [0,1,2,3,4].map(oi => hdcpInfo.sHoles[oi]?.includes(holeNum)) : Array(5).fill(false);
  
  let captTeamOI=[], fieldOI=[];
  if (partner !== null) {
    captTeamOI = partner==="alone" ? [curCaptOI] : [curCaptOI,partner];
    fieldOI = [0,1,2,3,4].filter(i=>!captTeamOI.includes(i));
  }

  const wrap = h("div",{});
  
  // Game header
  const ghdr = h("div",{style:{background:"linear-gradient(160deg,#162916,#0a1a0a)",padding:"10px 14px",borderBottom:"2px solid #1e4a1e",display:"flex",justifyContent:"space-between",alignItems:"center"}});
  ghdr.appendChild(h("div",{},h("div",{style:{fontSize:26,fontWeight:700,letterSpacing:2,color:"#c5e8c5"}},"HOLE "+holeNum)));
  ghdr.appendChild(h("div",{style:{textAlign:"center"}},h("div",{style:{fontSize:11,color:"#555"}},round.courseData?.name||""),h("div",{style:{fontSize:12,color:"#f59e0b",fontWeight:700}},round.gameCode||"")));
  ghdr.appendChild(h("div",{style:{textAlign:"right"}},h("div",{style:{fontSize:16,color:"#4ade80",fontWeight:700}},"$"+activeDpp+"/pt"),h("div",{style:{fontSize:10,color:"#555"}},holeNum+"/18")));
  wrap.appendChild(ghdr);

  // Ledger
  const ledgerDiv = h("div",{style:{display:"flex",background:"#0a130a",borderBottom:"1px solid #1a3a1a",overflowX:"auto"}});
  orderPlayers.forEach((p,oi) => {
    const item = h("div",{style:{flex:1,padding:"7px 3px",textAlign:"center",borderRight:"1px solid #1a3a1a",minWidth:68}});
    item.appendChild(h("div",{style:{fontSize:10,color:"#555"}},p.name?.split(" ")[0]||"?"));
    item.appendChild(h("div",{style:{fontSize:13,fontWeight:700,color:ledger[oi]>=0?"#4ade80":"#f87171"}},fmt$(ledger[oi])));
    if(strokesThisHole[oi]) item.appendChild(h("div",{style:{fontSize:9,color:"#f59e0b"}},"+1"));
    ledgerDiv.appendChild(item);
  });
  wrap.appendChild(ledgerDiv);

  const card = h("div",{className:"card"});

  // Press zone
  if (step==="captain" && holeNum>1) {
    const pressZone = h("div",{style:{background:"#100a00",border:"1px solid #2a1a00",borderRadius:8,padding:"10px 12px",marginBottom:12}});
    if (!showPress) {
      const pb = h("button",{style:{background:"transparent",border:"1px solid #2a1a00",borderRadius:8,color:"#f59e0b",padding:"9px 14px",fontSize:12,cursor:"pointer",fontFamily:"Georgia,serif",width:"100%"}},"💰 Declare Press");
      pb.onclick = () => setState({showPress:true});
      pressZone.appendChild(pb);
    } else {
      const negPlayers = [0,1,2,3,4].filter(i=>ledger[i]<0);
      pressZone.appendChild(h("div",{style:{fontSize:10,color:"#f59e0b",letterSpacing:2,marginBottom:8}},"WHO IS PRESSING?"));
      if (negPlayers.length===0) pressZone.appendChild(h("div",{style:{fontSize:12,color:"#666"}},"No one is negative."));
      const pRow = h("div",{className:"row"});
      negPlayers.forEach(oi => {
        const pb = h("button",{className:"btn-ghost",style:{fontSize:13,...(pressingPlayer===oi?{border:"1px solid #f59e0b",color:"#f59e0b"}:{})}},orderPlayers[oi]?.name||"?");
        pb.onclick = () => setState({pressingPlayer:oi});
        pRow.appendChild(pb);
      });
      pressZone.appendChild(pRow);
      if (pressingPlayer !== null) {
        if (round.pressMode==="custom") {
          const pInp = h("input",{type:"number",placeholder:"New $/pt"});
          pInp.oninput = e => { state.pressCustomVal = e.target.value; };
          const setBtn = h("button",{className:"btn"},"Set Press");
          setBtn.onclick = () => {
            const newDpp = parseFloat(state.pressCustomVal);
            if (!newDpp) return;
            state.pressLog.push({hole:holeNum,presser:pressingPlayer,fromDpp:activeDpp,toDpp:newDpp});
            setState({activeDpp:newDpp,showPress:false,pressingPlayer:null,pressCustomVal:""});
          };
          pressZone.appendChild(pInp); pressZone.appendChild(setBtn);
        } else {
          const orig = parseFloat(round.dpp||1);
          const newDpp = round.pressMode==="double" ? activeDpp*2 : activeDpp+orig;
          pressZone.appendChild(h("div",{style:{fontSize:13,color:"#e4ede4",marginTop:8}},"$"+activeDpp+" → $"+newDpp+"/pt"));
          const confirmBtn = h("button",{className:"btn"},"Confirm Press");
          confirmBtn.onclick = () => {
            state.pressLog.push({hole:holeNum,presser:pressingPlayer,fromDpp:activeDpp,toDpp:newDpp});
            setState({activeDpp:newDpp,showPress:false,pressingPlayer:null});
          };
          pressZone.appendChild(confirmBtn);
        }
      }
      const cancelBtn = h("button",{className:"btn-dark"},"Cancel");
      cancelBtn.onclick = () => setState({showPress:false,pressingPlayer:null});
      pressZone.appendChild(cancelBtn);
    }
    card.appendChild(pressZone);
  }

  // Step 1: Captain picks
  if (step==="captain") {
    card.appendChild(h("div",{className:"sec"},"⛳ "+(orderPlayers[curCaptOI]?.name||"?")+" is Captain"+(isLightning?" ⚡":"")+(round.lightningRound==="14"&&(currentHole===14||currentHole===15)?" (fixed)":"")));
    
    if (isLightning) {
      const passBtn = h("button",{className:"btn-ghost",style:{width:"100%",marginBottom:10}},"Pass → next biggest loser");
      passBtn.onclick = () => setState({passed:[...passed,curCaptOI]});
      card.appendChild(passBtn);
    }

    // Stroke badges
    const strokeDiv = h("div",{style:{display:"flex",flexWrap:"wrap",gap:5,marginBottom:12}});
    orderPlayers.forEach((p,oi) => {
      const badge = h("div",{style:{fontSize:12,color:strokesThisHole[oi]?"#f59e0b":"#444",background:strokesThisHole[oi]?"#1a1000":"#080d08",borderRadius:6,padding:"4px 8px",border:strokesThisHole[oi]?"1px solid #3a2000":"1px solid #1a3a1a"}},(p.name?.split(" ")[0]||"?")+" "+(strokesThisHole[oi]?"+1":"—"));
      strokeDiv.appendChild(badge);
    });
    card.appendChild(strokeDiv);

    const pickDiv = h("div",{style:{display:"flex",flexWrap:"wrap",gap:6}});
    const loneBtn = h("button",{style:{flex:1,minWidth:"100%",background:partner==="alone"?"#162616":"#0a130a",border:partner==="alone"?"2px solid #4ade80":"1px solid #1e3a1e",borderRadius:8,color:partner==="alone"?"#e4ede4":"#bbb",padding:"13px 8px",fontSize:14,cursor:"pointer",fontFamily:"Georgia,serif",textAlign:"center",marginBottom:6}},"🦅 Lone Captain");
    loneBtn.onclick = () => setState({partner:"alone"});
    pickDiv.appendChild(loneBtn);
    [0,1,2,3,4].filter(oi=>oi!==curCaptOI).forEach(oi => {
      const pb = h("button",{style:{flex:1,minWidth:"47%",background:partner===oi?"#162616":"#0a130a",border:partner===oi?"2px solid #4ade80":"1px solid #1e3a1e",borderRadius:8,color:partner===oi?"#e4ede4":"#bbb",padding:"13px 8px",fontSize:14,cursor:"pointer",fontFamily:"Georgia,serif",marginBottom:6,textAlign:"center"}},(orderPlayers[oi]?.name||"?")+(strokesThisHole[oi]?" +1":""));
      pb.onclick = () => setState({partner:oi});
      pickDiv.appendChild(pb);
    });
    card.appendChild(pickDiv);

    if (partner !== null) {
      const teamsDiv = h("div",{style:{display:"flex",gap:8,margin:"12px 0"}});
      const captBox = h("div",{style:{flex:1,background:"#080d08",borderRadius:8,padding:"10px 12px"}},h("div",{style:{fontSize:9,letterSpacing:2,color:"#4ade80",marginBottom:4}},"CAPT'S TEAM"));
      captTeamOI.forEach(oi => captBox.appendChild(h("div",{style:{fontSize:14,color:"#c5e8c5"}},orderPlayers[oi]?.name||"?")));
      const fieldBox = h("div",{style:{flex:1,background:"#080d08",borderRadius:8,padding:"10px 12px"}},h("div",{style:{fontSize:9,letterSpacing:2,color:"#888",marginBottom:4}},"FIELD"));
      fieldOI.forEach(oi => fieldBox.appendChild(h("div",{style:{fontSize:14,color:"#aaa"}},orderPlayers[oi]?.name||"?")));
      teamsDiv.appendChild(captBox); teamsDiv.appendChild(fieldBox);
      card.appendChild(teamsDiv);
      const nextBtn = h("button",{className:"btn"},"Enter Result →");
      nextBtn.onclick = () => setState({step:"result"});
      card.appendChild(nextBtn);
    }
  }

  // Step 2: Result
  if (step==="result") {
    card.appendChild(h("div",{className:"sec"},"Who Won Hole "+holeNum+"?"));
    
    const teamsDiv = h("div",{style:{display:"flex",gap:8,marginBottom:14}});
    const captBox = h("div",{style:{flex:1,background:"#080d08",borderRadius:8,padding:"10px 12px"}},h("div",{style:{fontSize:9,letterSpacing:2,color:"#4ade80",marginBottom:4}},"CAPT'S TEAM"));
    captTeamOI.forEach(oi => captBox.appendChild(h("div",{style:{fontSize:13,color:"#c5e8c5"}},orderPlayers[oi]?.name||"?")));
    const fieldBox = h("div",{style:{flex:1,background:"#080d08",borderRadius:8,padding:"10px 12px"}},h("div",{style:{fontSize:9,letterSpacing:2,color:"#888",marginBottom:4}},"FIELD"));
    fieldOI.forEach(oi => fieldBox.appendChild(h("div",{style:{fontSize:13,color:"#aaa"}},orderPlayers[oi]?.name||"?")));
    teamsDiv.appendChild(captBox); teamsDiv.appendChild(fieldBox);
    card.appendChild(teamsDiv);

    const winRow = h("div",{style:{display:"flex",gap:6}});
    [{k:"captain",lbl:"Captain's Team"},{k:"field",lbl:"Field"},{k:"none",lbl:"No Blood"}].forEach(({k,lbl}) => {
      const wb = h("button",{style:{flex:k==="none"?0.7:1,background:winner===k?"#162616":"#0a130a",border:winner===k?"2px solid #4ade80":"1px solid #1e3a1e",borderRadius:8,color:winner===k?"#e4ede4":"#bbb",padding:"13px 6px",fontSize:12,cursor:"pointer",fontFamily:"Georgia,serif",textAlign:"center"}},lbl);
      wb.onclick = () => setState({winner:k, pts:k==="none"?null:pts});
      winRow.appendChild(wb);
    });
    card.appendChild(winRow);

    if (winner && winner!=="none") {
      card.appendChild(h("div",{className:"sec"},"How Many Points?"));
      const ptGrid = h("div",{style:{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:5,margin:"8px 0"}});
      [1,2,3,4,5,6,7].forEach(p => {
        const pb = h("button",{style:{background:pts===p?"#162616":"#0a130a",border:pts===p?"2px solid #4ade80":"1px solid #1e3a1e",borderRadius:8,color:pts===p?"#e4ede4":"#bbb",padding:"13px 4px",fontSize:20,cursor:"pointer",fontFamily:"Georgia,serif",textAlign:"center"}},p+(p===7?" ×2":""));
        pb.onclick = () => setState({pts:p});
        ptGrid.appendChild(pb);
      });
      card.appendChild(ptGrid);
    }

    // Money preview
    if (winner && (winner==="none"||pts)) {
      const realPts = pts===7?14:(pts||0);
      const ptVal = realPts * activeDpp * (partner==="alone"?2:1);
      const mbox = h("div",{style:{background:"#080d08",borderRadius:8,padding:"10px 12px",margin:"10px 0",fontSize:13}});
      mbox.appendChild(h("div",{style:{color:"#4ade80",fontSize:10,letterSpacing:2,marginBottom:6}},"MONEY PREVIEW"));
      if (winner==="none") mbox.appendChild(h("div",{style:{color:"#555"}},"No blood."));
      else if (partner==="alone") mbox.appendChild(h("div",{},
        h("div",{style:{color:"#e4ede4"}},realPts+" pts × $"+activeDpp+" × 2 = $"+ptVal+"/player"),
        h("div",{style:{color:winner==="captain"?"#4ade80":"#f87171",marginTop:4}},
          winner==="captain"
            ? (orderPlayers[curCaptOI]?.name+" collects $"+(ptVal*4))
            : (orderPlayers[curCaptOI]?.name+" pays $"+(ptVal*4)))));
      else {
        // Determine winning and losing team sizes based on who actually won
        const winTeamOI = winner==="captain" ? captTeamOI : fieldOI;
        const loseTeamOI = winner==="captain" ? fieldOI : captTeamOI;
        const winNames = winTeamOI.map(oi => orderPlayers[oi]?.name?.split(" ")[0]||"?").join(", ");
        const loseNames = loseTeamOI.map(oi => orderPlayers[oi]?.name?.split(" ")[0]||"?").join(", ");
        if (winTeamOI.length===3) {
          // 3-man wins: each winner gets ptVal, 2-man losers split 3×ptVal
          mbox.appendChild(h("div",{},
            h("div",{style:{color:"#4ade80"}},"Winners ("+winNames+"): each +$"+ptVal),
            h("div",{style:{color:"#f87171",marginTop:4}},"Losers ("+loseNames+"): split -$"+(ptVal*3)+" (~$"+Math.ceil(ptVal*3/2)+"/$"+Math.floor(ptVal*3/2)+")")));
        } else {
          // 2-man wins: each loser pays ptVal, 2-man winners split 3×ptVal
          mbox.appendChild(h("div",{},
            h("div",{style:{color:"#f87171"}},"Losers ("+loseNames+"): each -$"+ptVal),
            h("div",{style:{color:"#4ade80",marginTop:4}},"Winners ("+winNames+"): split +$"+(ptVal*3)+" (~$"+Math.ceil(ptVal*3/2)+"/$"+Math.floor(ptVal*3/2)+")")));
        }
      }
      if (pts===7) mbox.appendChild(h("div",{style:{color:"#f59e0b",fontSize:11,marginTop:6}},"🔥 7 pts → 14"));
      card.appendChild(mbox);
    }

    const confirmBtn = h("button",{className:"btn",style:{opacity:(winner==="none"||pts)?1:0.4}},holeNum<18?"Confirm → Hole "+(holeNum+1):"Finish Round");
    confirmBtn.onclick = async () => {
      if (!winner||(winner!=="none"&&!pts)) return;
      const realPts = pts===7?14:(pts||0);
      const hRec = {hole:holeNum, captainOI:curCaptOI, partnerOI:partner==="alone"?null:partner, partner, winner, pts:realPts, dpp:activeDpp, ledgerAfter:null};
      const hdcps = hdcpInfo?.courseHdcps;
      const nl = applyHoleMoney(hRec, ledger, activeDpp, hdcps);
      hRec.ledgerAfter = [...nl];
      const newHoles = [...holes, hRec];
      await updateRound(state.roundId, {holes:newHoles, activeDpp, ledger:nl});
      if (currentHole>=17) {
        const results = orderPlayers.map((p,i)=>({playerId:round.playerOrder[i],name:p.name,money:nl[i]}));
        await db.collection("rounds").doc(state.roundId).update({status:"complete",finalLedger:nl,results,completedAt:firebase.firestore.FieldValue.serverTimestamp()});
        setState({screen:"summary",holes:newHoles,ledger:nl});
      } else {
        setState({holes:newHoles,ledger:nl,currentHole:currentHole+1,step:"captain",partner:null,winner:null,pts:null,passed:[],editingHole:null});
      }
    };
    const backBtn = h("button",{className:"btn-dark"},"← Change Teams");
    backBtn.onclick = () => setState({step:"captain"});
    card.appendChild(confirmBtn); card.appendChild(backBtn);
  }

  // Reset hole button — always visible so captain pick can be redone
  const resetCard = h("div",{className:"card",style:{marginTop:0}});
  resetCard.appendChild(h("div",{className:"sec"},"Current Hole Options"));
  const resetBtn = h("button",{className:"btn-dark"},"↩ Reset This Hole (redo captain pick)");
  resetBtn.onclick = () => setState({step:"captain", partner:null, winner:null, pts:null, showPress:false, pressingPlayer:null});
  resetCard.appendChild(resetBtn);

  // Edit last completed hole
  if (holes.length > 0) {
    const lastH = holes[holes.length-1];
    const editLastBtn = h("button",{className:"btn-dark",style:{marginTop:6}},"✏️ Edit Hole "+(holes.length)+" result");
    editLastBtn.onclick = () => setState({editingHole: holes.length-1, step:"edithole"});
    resetCard.appendChild(editLastBtn);
  }
  wrap.appendChild(resetCard);
  wrap.appendChild(buildNav("game"));
  return wrap;
}

// ── Summary ───────────────────────────────────────────────────────────────────
function buildSummary() {
  const {round, holes, ledger, pressLog} = state;
  const orderPlayers = (round?.playerOrder||[]).map(id => state.players.find(p=>p.id===id)||{name:"?",index:0});
  const sorted = orderPlayers.map((p,i)=>({...p,oi:i,money:ledger[i]||0})).sort((a,b)=>b.money-a.money);
  const today = new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
  const note = "5-Man Captain · "+(round?.courseData?.name||"Golf")+" · "+today;
  
  const wrap = h("div",{},h("div",{className:"hdr"},h("div",{className:"logo"},"FINAL"),h("div",{className:"sub"},"5-MAN CAPTAIN")));
  const card = h("div",{className:"card"},h("div",{className:"sec"},"Final Standings — "+(round?.courseData?.name||"")));
  
  sorted.forEach((p,rank) => {
    const row = h("div",{className:"player-row",style:{cursor:"default",borderLeft:rank===0?"3px solid #f59e0b":rank===sorted.length-1?"3px solid #f87171":"3px solid #1a3a1a"}});
    row.appendChild(h("span",{style:{color:rank===0?"#f59e0b":"#4ade80",fontWeight:700,fontSize:18,minWidth:24}},rank+1+""));
    row.appendChild(h("span",{style:{flex:1,fontSize:16}},p.name||"?"));
    row.appendChild(h("span",{style:{fontSize:20,fontWeight:700,color:p.money>=0?"#4ade80":"#f87171"}},fmt$(p.money)));
    card.appendChild(row);
  });
  wrap.appendChild(card);

  // Settlement
  const sCard = h("div",{className:"card"},h("div",{className:"sec"},"Settle Up"));
  const txns = computeSettlement(orderPlayers, ledger, round?.playerOrder, state.players);
  if (txns.length===0) sCard.appendChild(h("div",{style:{color:"#555",textAlign:"center",padding:12}},"All square!"));
  txns.forEach(txn => {
    const tDiv = h("div",{style:{background:"#080d08",borderRadius:10,padding:"12px 14px",marginBottom:8,border:"1px solid #1a3a1a"}});
    tDiv.appendChild(h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}},h("div",{},h("span",{style:{fontSize:15,color:"#f87171",fontWeight:700}},txn.from.name),h("span",{style:{fontSize:13,color:"#555",margin:"0 8px"}},"→"),h("span",{style:{fontSize:15,color:"#4ade80",fontWeight:700}},txn.to.name)),h("span",{style:{fontSize:20,fontWeight:700}},"$"+txn.amount)));
    const method = txn.to.paymentMethod;
    const handle = txn.to.paymentHandle;
    const links = {venmo:`venmo://paycharge?txn=pay&recipients=${encodeURIComponent(handle)}&amount=${txn.amount}&note=${encodeURIComponent(note)}&audience=private`,cashapp:`cashapp://cash.app/${handle.startsWith("$")?handle:"$"+handle}?amount=${txn.amount}`,paypal:`https://paypal.me/${handle.replace("@","")}/${txn.amount}`};
    const link = links[method];
    const colors = {venmo:"#3D95CE",cashapp:"#00D632",paypal:"#003087"};
    const btnLabels = {venmo:"Pay Venmo",cashapp:"Pay Cash App",paypal:"Pay PayPal"};
    const payDiv = h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between"}});
    payDiv.appendChild(h("span",{style:{fontSize:11,color:"#555"}},method==="cash"?"Cash":handle));
    if (method==="cash") payDiv.appendChild(h("span",{style:{fontSize:12,color:"#888",fontStyle:"italic"}},"Cash"));
    else if (link) { const a = h("a",{href:link,style:{background:colors[method]||"#1a5c1a",color:"#fff",borderRadius:8,padding:"8px 14px",fontSize:13,textDecoration:"none",fontFamily:"Georgia,serif",fontWeight:700}},btnLabels[method]||"Pay"); payDiv.appendChild(a); }
    else payDiv.appendChild(h("span",{style:{fontSize:12,color:"#888"}},"Open "+method+" manually"));
    tDiv.appendChild(payDiv);
    sCard.appendChild(tDiv);
  });
  sCard.appendChild(h("div",{style:{fontSize:11,color:"#444",marginTop:8,textAlign:"center"}},note));
  wrap.appendChild(sCard);

  // Hole log
  const hCard = h("div",{className:"card"},h("div",{className:"sec"},"Hole by Hole"));
  holes.forEach(h2 => {
    const hDiv = h("div",{style:{marginBottom:8,paddingBottom:8,borderBottom:"1px solid #1a3a1a"}});
    hDiv.appendChild(h("div",{style:{display:"flex",justifyContent:"space-between"}},h("span",{style:{color:"#4ade80",fontSize:13,fontWeight:700}},"Hole "+h2.hole),h("span",{style:{fontSize:11,color:"#555"}},"$"+h2.dpp+"/pt")));
    const orderPlayers2 = (round?.playerOrder||[]).map(id => state.players.find(p=>p.id===id)||{name:"?"});
    hDiv.appendChild(h("div",{style:{fontSize:12,color:"#777",marginTop:2}},"Capt: "+(orderPlayers2[h2.captainOI]?.name||"?")+(h2.partner==="alone"?" 🦅 Lone":h2.partnerOI!==null?" + "+(orderPlayers2[h2.partnerOI]?.name||"?"):"")));
    hDiv.appendChild(h("div",{style:{fontSize:13,marginTop:2,color:h2.winner==="none"?"#444":h2.winner==="captain"?"#4ade80":"#f87171"}},h2.winner==="none"?"No blood":(h2.winner==="captain"?"Capt's Team":"Field")+" — "+h2.pts+" pts"));
    hCard.appendChild(hDiv);
  });
  wrap.appendChild(hCard);

  const homeBtn = h("button",{className:"btn",style:{margin:"0 12px 80px"}},"← Home");
  homeBtn.onclick = () => setState({screen:"home"});
  wrap.appendChild(homeBtn);
  wrap.appendChild(buildNav("home"));
  return wrap;
}

// ── History ───────────────────────────────────────────────────────────────────
function buildHistory() {
  const {history} = state;
  const wrap = h("div",{},h("div",{className:"hdr"},h("div",{className:"logo"},"5-MAN"),h("div",{className:"sub"},"HISTORY")));
  if (!history.length) {
    wrap.appendChild(h("div",{className:"card"},h("div",{style:{color:"#555",textAlign:"center",padding:20}},"No rounds yet.")));
  }
  history.forEach(r => {
    const card = h("div",{className:"card"});
    card.appendChild(h("div",{style:{display:"flex",justifyContent:"space-between"}},h("span",{style:{color:"#4ade80",fontSize:13}},r.date||""),h("span",{style:{fontSize:12,color:"#555"}},"$"+(r.dpp||0)+"/pt · "+(r.gameCode||""))));
    card.appendChild(h("div",{style:{fontSize:12,color:"#777",marginBottom:8}},(r.courseData?.name||"")+" — "+(r.courseData?.tee||"")+" tees"));
    (r.results||[]).sort((a,b)=>b.money-a.money).forEach((p,i)=>{
      const row=h("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:4}});
      row.appendChild(h("span",{style:{fontSize:14,color:i===0?"#f59e0b":"#e4ede4"}},p.name||"?"));
      row.appendChild(h("span",{style:{fontWeight:700,color:(p.money||0)>=0?"#4ade80":"#f87171"}},fmt$(p.money||0)));
      card.appendChild(row);
    });
    wrap.appendChild(card);
  });
  wrap.appendChild(buildNav("history"));
  return wrap;
}

// ── Stats ─────────────────────────────────────────────────────────────────────
function buildStats() {
  const {players} = state;
  const tab = state.statsTab||"er";
  const wrap = h("div",{},h("div",{className:"hdr"},h("div",{className:"logo"},"5-MAN"),h("div",{className:"sub"},"STATS & RANKINGS")));
  const card = h("div",{className:"card"});
  
  const tabRow = h("div",{style:{display:"flex",gap:6,marginBottom:12}});
  [["er","Efficiency"],["cer","Captain ER"],["wins","Wins"],["money","Total $"]].forEach(([k,lbl])=>{
    const tb = h("button",{className:"btn-ghost",style:{flex:1,fontSize:11,padding:"8px 4px",...(tab===k?{border:"1px solid #4ade80",color:"#4ade80"}:{})}},lbl);
    tb.onclick = () => setState({statsTab:k});
    tabRow.appendChild(tb);
  });
  card.appendChild(tabRow);

  const ranked = [...players].filter(p=>p.rounds>0).sort((a,b)=>{
    if(tab==="er") return ((b.totalMoney||0)/(b.totalHoles||1))-((a.totalMoney||0)/(a.totalHoles||1));
    if(tab==="cer") { if((a.captainHoles||0)<10) return 1; if((b.captainHoles||0)<10) return -1; return ((b.captainMoney||0)/(b.captainHoles||1))-((a.captainMoney||0)/(a.captainHoles||1)); }
    if(tab==="wins") return (b.wins||0)-(a.wins||0);
    return (b.totalMoney||0)-(a.totalMoney||0);
  });

  if (!ranked.length) card.appendChild(h("div",{style:{color:"#555",textAlign:"center",padding:20}},"No stats yet."));
  ranked.forEach((p,i)=>{
    const er = (p.totalHoles||0)>0 ? "$"+((p.totalMoney||0)/(p.totalHoles)).toFixed(2)+"/hole" : "—";
    const cer = (p.captainHoles||0)>=10 ? "$"+((p.captainMoney||0)/p.captainHoles).toFixed(2)+"/hole" : "< 10 holes";
    const val = tab==="er"?er:tab==="cer"?cer:tab==="wins"?(p.wins||0)+" wins":fmt$(p.totalMoney||0);
    const row = h("div",{className:"player-row",style:{cursor:"default",borderLeft:i===0?"3px solid #f59e0b":"3px solid #1a3a1a"}});
    row.appendChild(h("span",{style:{color:i===0?"#f59e0b":"#4ade80",fontWeight:700,fontSize:18,minWidth:24}},i+1+""));
    const info = h("div",{style:{flex:1}},h("div",{style:{fontSize:15}},p.name),h("div",{style:{fontSize:11,color:"#666"}},(p.rounds||0)+" rounds · "+(p.captainHoles||0)+" captain holes"));
    row.appendChild(info);
    row.appendChild(h("span",{style:{fontSize:15,fontWeight:700}},String(val)));
    card.appendChild(row);
  });
  wrap.appendChild(card);
  wrap.appendChild(buildNav("stats"));
  return wrap;
}

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  const saved = loadSession();
  if (saved) {
    state.user = saved;
    state.screen = "home";
  }
  // Load players
  try {
    state.players = await loadPlayers();
  } catch(e) {
    console.error("Failed to load players:", e);
  }
  render();
}

init();
</script>
